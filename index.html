<style>

<script>
"use strict";
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const W = 420, H = 760;

/* ---------- audio ---------- */
let AC = null, muted = false;
function beep(f, dur, type, vol, slide){
  if (muted) return;
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type||'square'; o.frequency.value = f;
    if (slide) o.frequency.exponentialRampToValueAtTime(slide, AC.currentTime+dur);
    g.gain.value = vol||.04; g.gain.exponentialRampToValueAtTime(.0001, AC.currentTime+dur);
    o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime+dur);
  }catch(e){}
}

/* ---------- wall & slots (城牆式防守佈局) ---------- */
// 城牆帶:雉堞造型畫在 WALL_TOP~WALL_BOTTOM,牆血條畫在牆帶正下方。
// 敵人從畫面頂部往下壓,y>=WALL_TOP 視為撞牆。上方為戰場(天空/地面漸層)。
const WALL_TOP = 600, WALL_BOTTOM = 660;
const SLOT_Y = 628;
const SLOT_Y2 = SLOT_Y - 56; // 第二排:疊在第一排正上方
const PET_ICON = { x: W-18, y: WALL_TOP-14 };
const BASE_SLOTS = 8, ROW1_MAX = 10, MAX_SLOTS = 20;
// 槽位鄰接表產生器:第一排=左右相鄰+正上方(若疊有第二排格);第二排=底座相鄰的第二排格+正下方格。
// 用於 😇/🎵 光環判定「相鄰槽位」;擴格/reset 時重建。讀取全域 SLOTS(呼叫前需已賦值)。
function buildAdj(){
  const row1Global = []; // row1 的本地序(0..n1-1) -> 對應的全域 SLOTS index
  SLOTS.forEach((s,gi)=>{ if (s.row===1) row1Global.push(gi); });
  const n1 = row1Global.length;
  const row2ByBase = {}; // row1 本地序 -> 疊在其正上方的 row2 全域 index
  SLOTS.forEach((s,gi)=>{ if (s.row===2) row2ByBase[s.base]=gi; });
  return SLOTS.map((s,gi)=>{
    const adj=[];
    if (s.row===1){
      const li = row1Global.indexOf(gi);
      if (li>0) adj.push(row1Global[li-1]);
      if (li<n1-1) adj.push(row1Global[li+1]);
      if (row2ByBase[li]!==undefined) adj.push(row2ByBase[li]);
    } else {
      const li = s.base;
      if (row1Global[li]!==undefined) adj.push(row1Global[li]);
      if (li>0 && row2ByBase[li-1]!==undefined) adj.push(row2ByBase[li-1]);
      if (li<n1-1 && row2ByBase[li+1]!==undefined) adj.push(row2ByBase[li+1]);
    }
    return adj;
  });
}
function makeSlots(n){
  return Array.from({length:n}, (_,i)=>({ x:(W/n)*(i+0.5), y:SLOT_Y, unit:null, row:1 }));
}
let SLOTS = makeSlots(BASE_SLOTS);
let ADJ = buildAdj();
// 槽位全滿 + 不存在任何可合成對(同 key、同 lvl、lvl<6)時視為卡死。
// isDeadlocked() 呼叫前提是至少已知全滿(內部仍會再檢查一次,雙重保險)。
function isDeadlocked(){
  if (SLOTS.some(s=>!s.unit)) return false;
  for (let i=0;i<SLOTS.length;i++){
    const a = SLOTS[i].unit;
    if (a.lvl>=6) continue;
    for (let j=i+1;j<SLOTS.length;j++){
      const b = SLOTS[j].unit;
      if (b.type===a.type && b.lvl===a.lvl) return false;
    }
  }
  return true;
}
// 卡死時擴增一個空槽(防卡死自動擴格):第一排優先補到 ROW1_MAX(=10),滿了才疊第二排
// (疊在隨機一個「上方還沒有格子」的第一排格正上方),上限 MAX_SLOTS(=20)。
function relayoutSlots(){
  const row1 = SLOTS.filter(s=>s.row===1);
  const n = row1.length;
  row1.forEach((s,i)=>{ s.x = (W/n)*(i+0.5); });
  SLOTS.filter(s=>s.row===2).forEach(s=>{ s.x = row1[s.base].x; });
  ADJ = buildAdj();
}
function grantExtraSlot(){
  if (SLOTS.length >= MAX_SLOTS) return false;
  const row1 = SLOTS.filter(s=>s.row===1);
  if (row1.length < ROW1_MAX){
    SLOTS.push({ x:0, y:SLOT_Y, unit:null, row:1 });
    relayoutSlots();
    floatTxt(W/2, SLOT_Y-66, '🧱 牆面擴建!+1 格', '#FFC94D', 15);
    puff(W/2, SLOT_Y-40, '#FFC94D', 10);
  } else {
    const occupiedBases = new Set(SLOTS.filter(s=>s.row===2).map(s=>s.base));
    const candidates = row1.map((s,idx)=>idx).filter(idx=>!occupiedBases.has(idx));
    if (!candidates.length) return false;
    const baseIdx = candidates[Math.floor(Math.random()*candidates.length)];
    const baseSlot = row1[baseIdx];
    SLOTS.push({ x:baseSlot.x, y:SLOT_Y2, unit:null, row:2, base:baseIdx });
    relayoutSlots();
    floatTxt(baseSlot.x, SLOT_Y2-30, '🧱 二層擴建!+1 格', '#FFC94D', 14);
    puff(baseSlot.x, SLOT_Y2, '#FFC94D', 10);
  }
  beep(880,.22,'triangle',.06,1200);
  return true;
}
// 20 格全滿仍卡死的最終保險:隨機挑一隻 A 變身成場上另一隻 B 的 key+lvl(A 稀有度保留),
// 保證場上出現可合成對,永不死局。
function forcedReroll(){
  const filled = SLOTS.map((s,i)=>i).filter(i=>SLOTS[i].unit);
  if (filled.length<2) return;
  const ai = filled[Math.floor(Math.random()*filled.length)];
  let bi = ai; while(bi===ai) bi = filled[Math.floor(Math.random()*filled.length)];
  const a = SLOTS[ai].unit, b = SLOTS[bi].unit;
  a.type = b.type; a.lvl = b.lvl; a.pop = .45;
  floatTxt(SLOTS[ai].x, SLOTS[ai].y-34, '🔄 命運重組!', '#FF7B5C', 15);
  puff(SLOTS[ai].x, SLOTS[ai].y, '#FF7B5C', 10);
  beep(220,.3,'sawtooth',.08,120);
}
function auraBuff(i){
  let sum = 0;
  for (const j of ADJ[i]){
    const nb = SLOTS[j].unit;
    // support 角色的持久等級(charDmgMul)同倍率作用於光環強度(PLAN S2)
    if (nb && TYPES[nb.type] && TYPES[nb.type].auraDmg) sum += (0.10+0.06*nb.lvl)*(nb.mul||1)*charDmgMul(nb.type);
  }
  return sum * (st.buff.auraMul||1);
}
// 🎵 音符(support2)攻速光環:鄰居 cd 每幀多扣 (1+Σaspd) 倍,等效冷卻時間 ÷(1+Σaspd)
function auraAspd(i){
  let sum = 0;
  for (const j of ADJ[i]){
    const nb = SLOTS[j].unit;
    if (nb && TYPES[nb.type] && TYPES[nb.type].auraAspd) sum += (0.08+0.04*nb.lvl)*(nb.mul||1)*charDmgMul(nb.type);
  }
  return sum * (st.buff.auraMul||1);
}

const TYPE_KEYS = Object.keys(TYPES);
const LVL_MUL = l => Math.pow(2.2, l-1);

/* ---------- deck (編隊:肉鴿核心,12 選 6 上場,決定召喚池與合成變種池) ---------- */
const CLS_POOL_WEIGHT = { archer:22, mage:22, spark:22, ice:14, poison:14, support:6 };
const DECK_KEY = 'kdp_deck';
const DEFAULT_DECK = ['archer','mage','spark','icemage','poison','support'];
function loadDeck(){
  let d = null;
  try{ d = JSON.parse(localStorage.getItem(DECK_KEY)||'null'); }catch(e){ d = null; }
  if (!Array.isArray(d) || d.length!==6 || !d.every(k=>TYPES[k]) || new Set(d).size!==6) d = [...DEFAULT_DECK];
  return d;
}
function saveDeck(){ localStorage.setItem(DECK_KEY, JSON.stringify(deck)); }
let deck = loadDeck();
// 召喚池權重:單隻權重 = 職業權重 ÷ 編隊中該職業角色數(weightedPick 內部會除以總和,不需手動歸一化)
function deckWeights(){
  const clsCounts = {};
  deck.forEach(k=>{ const c=TYPES[k].cls; clsCounts[c]=(clsCounts[c]||0)+1; });
  return deck.map(k=>{ const c=TYPES[k].cls; return { key:k, rate: CLS_POOL_WEIGHT[c]/clsCounts[c] }; });
}
function pickType(){ return weightedPick(deckWeights()).key; }
// HUD 顯示用:編隊 6 隻的實際召喚機率(name 前兩字 + 百分比)
function deckRateLine(){
  const w = deckWeights();
  const sum = w.reduce((a,x)=>a+x.rate,0);
  return w.map(x=>TYPES[x.key].name.slice(0,2)+Math.round(x.rate/sum*100)).join(' ');
}
// 編隊切換(PLAN S1 既有玩家保護 / 解鎖約束):只有 vault.charUnlock[k]===true 的角色能被加入編隊。
// 供 UI(現有 deckCard onclick、Step2 角色頁)共用呼叫,回傳 {ok, action|msg, key}。
function toggleDeckChar(k){
  if (!TYPES[k]) return { ok:false, msg:'無效角色' };
  const idx = deck.indexOf(k);
  if (idx>=0){ deck.splice(idx,1); saveDeck(); return { ok:true, action:'removed', key:k }; }
  if (!vault.charUnlock[k]) return { ok:false, msg:'尚未解鎖,請先抽卡取得', locked:true, key:k };
  if (deck.length>=6) return { ok:false, msg:'已滿 6 隻,先取消一隻', key:k };
  deck.push(k); saveDeck();
  return { ok:true, action:'added', key:k };
}
// 存檔遷移保護後的保險:deck 內若仍含未解鎖角色(理論上不會發生),換成一個未在隊的已解鎖角色頂替。
function sanitizeDeckForUnlock(){
  let changed = false;
  for (let i=0;i<deck.length;i++){
    if (!vault.charUnlock[deck[i]]){
      changed = true;
      const cand = DEFAULT_DECK.find(k=>!deck.includes(k)) || TYPE_KEYS.find(k=>vault.charUnlock[k] && !deck.includes(k));
      if (cand) deck[i] = cand;
    }
  }
  if (changed) saveDeck();
}

  {key:'SR',  name:'超稀有', rate:6,  col:'#7E8FE0', star:3, startLvl:2, mul:1.80},
  {key:'SSR', name:'極稀有', rate:2,  col:'#FFC94D', star:4, startLvl:3, mul:2.60}
];
const PITY = 10; // 連抽未出 SR 以上,第 10 抽保底
function weightedPick(pool){
  const sum = pool.reduce((a,x)=>a+x.rate,0);
  let r = Math.random()*sum;
  for (const x of pool){ if ((r-=x.rate)<=0) return x; }
  return pool[pool.length-1];
}
// 通用保底抽取:holder[key] 累計未出 SR+ 的抽數,達 PITY 強制 SR+,出 SR+ 即歸零。
// 局內兵種召喚(st.pity)與局外裝備抽卡(vault.gearPity)共用同一套規則。
function rollRarityGeneric(holder, key){
  holder[key] = (holder[key]||0) + 1;
  const forced = holder[key] >= PITY;
  const pool = forced ? RARITY.filter(x=>x.star>=3) : RARITY;
  const r = weightedPick(pool);
  if (r.star>=3) holder[key] = 0;
  return r;
}
function rollRarity(){ return rollRarityGeneric(st, 'pity'); }

/* ---------- vault (局外裝備抽卡 / 局外貨幣) ---------- */

const GEAR_CATS = ['weapon','charm','pet'];

const GEAR_DRAW_COST = 20, GEAR_DISASSEMBLE_REFUND = 10, VAULT_FIRST_VISIT_BONUS = 60;
const VAULT_KEY = 'kdp_vault';
function loadVault(){
  let v = null;
  try{ v = JSON.parse(localStorage.getItem(VAULT_KEY)||'null'); }catch(e){ v = null; }
  if (!v || typeof v!=='object' || Array.isArray(v)) v = {};
  if (typeof v.diamonds!=='number' || isNaN(v.diamonds)) v.diamonds = 0;
  if (!v.gear || typeof v.gear!=='object' || Array.isArray(v.gear)) v.gear = { weapon:null, charm:null, pet:null };
  if (!v.pullCounts || typeof v.pullCounts !== 'object' || Array.isArray(v.pullCounts)) v.pullCounts = { N:0, R:0, SR:0, SSR:0 };
  if (typeof v.gearPity!=='number') v.gearPity = 0;
  if (typeof v.firstVisit!=='boolean') v.firstVisit = false;

  // --- v2 遷移(PLAN S4):角色解鎖/EXP/寵物碎片/共用抽卡保底。v!==2 視為舊檔,僅此升級一次。 ---
  // charUnlock 型別損毀(竄改/壞檔)時視同需要重建預設解鎖,理由同遷移:寧可還原安全基準,也不能讓玩家連原6隻都不能用。
  const needsMigration = v.v !== 2;
  const charUnlockWasInvalid = !v.charUnlock || typeof v.charUnlock!=='object' || Array.isArray(v.charUnlock);
  if (charUnlockWasInvalid) v.charUnlock = {};
  if (needsMigration || charUnlockWasInvalid){
    // 初始解鎖 = 原 6 隻;既有玩家保護:kdp_deck 內已含的角色(含新 6 隻)一併視為已解鎖
    DEFAULT_DECK.forEach(k=>{ v.charUnlock[k] = true; });
    let rawDeck = null;
    try{ rawDeck = JSON.parse(localStorage.getItem(DECK_KEY)||'null'); }catch(e){ rawDeck = null; }
    if (Array.isArray(rawDeck)) rawDeck.forEach(k=>{ if (TYPES[k]) v.charUnlock[k] = true; });
  }
  TYPE_KEYS.forEach(k=>{ if (typeof v.charUnlock[k]!=='boolean') v.charUnlock[k] = false; });

  if (!v.charExp || typeof v.charExp!=='object' || Array.isArray(v.charExp)) v.charExp = {};
  TYPE_KEYS.forEach(k=>{ if (typeof v.charExp[k]!=='number' || isNaN(v.charExp[k]) || v.charExp[k]<0) v.charExp[k] = 0; });

  if (!v.petShards || typeof v.petShards!=='object' || Array.isArray(v.petShards)) v.petShards = {};
  PET_SPECIES.forEach(sp=>{
    if (!v.petShards[sp] || typeof v.petShards[sp]!=='object' || Array.isArray(v.petShards[sp])) v.petShards[sp] = {};
    RARITY.forEach(r=>{ if (typeof v.petShards[sp][r.key]!=='number' || isNaN(v.petShards[sp][r.key]) || v.petShards[sp][r.key]<0) v.petShards[sp][r.key] = 0; });
  });

  if (typeof v.gachaPity!=='number') v.gachaPity = 0;

  v.v = 2;
  return v;
}

// kdp_stages(PLAN S3):{ 關卡編號: 星數(0-3) },只存已挑戰過的關卡

// 「取最強」比較:星級優先,同星比數值(同欄位內部比較,pet 跨物種比較以數值當戰力代理)
function isGearStronger(a, b){
  if (!b) return true;
  if (a.star !== b.star) return a.star > b.star;
  return a.value > b.value;
}
function gearItemLabel(it){

// 裝備抽卡核心(不含扣款/存檔/UI):holder[key] 帶入保底計數器,cats 決定抽卡分類池。
// 舊版 gachaGear()(全 3 類,含 pet)與新版 drawEquip()(僅 weapon/charm)共用此核心。
function drawGearCore(cats, holder, key){
  const r = rollRarityGeneric(holder, key);
  vault.pullCounts[r.key] = (vault.pullCounts[r.key]||0) + 1;
  const idx = r.star - 1;
  const cat = cats[Math.floor(Math.random()*cats.length)];
  let item;
  if (cat==='pet'){
    const sp = PET_SPECIES[Math.floor(Math.random()*PET_SPECIES.length)];
    item = { cat:'pet', species:sp, rarity:r.key, star:r.star, value:GEAR_TABLE.pet.species[sp].values[idx] };
  } else {
    item = { cat, rarity:r.key, star:r.star, value:GEAR_TABLE[cat].values[idx] };
  }
  const old = vault.gear[cat];
  let equipped, refund = 0;
  if (isGearStronger(item, old)){
    vault.gear[cat] = item; equipped = true;
    if (old) refund = GEAR_DISASSEMBLE_REFUND;
  } else {
    refund = GEAR_DISASSEMBLE_REFUND; equipped = false;
  }
  if (refund) vault.diamonds += refund;
  return { item, equipped, refund, rar:r.key };
}
// 舊版直抽裝備(含 pet 類,獨立 gearPity 保底):不再被寶庫單抽按鈕綁定,保留供相容呼叫。

/* ---------- 抽卡 v2(PLAN S1):角色卡 40% / 寵物碎片 30% / 裝備 30%,共用 vault.gachaPity 保底 ---------- */
const GACHA_COST = 20, GACHA_TEN_COST = 180;
const GACHA_TYPE_WEIGHTS = [ {key:'char', rate:40}, {key:'petShard', rate:30}, {key:'equip', rate:30} ];
const CHAR_EXP_ON_DUP = { N:10, R:25, SR:60, SSR:150 };
const PET_SHARD_CRAFT_THRESH = { N:10, R:20, SR:40, SSR:80 };
// 角色卡:12 隻均勻隨機;首抽解鎖(編隊可選),重複依稀有度轉 EXP。
function drawCharCard(){
  const key = TYPE_KEYS[Math.floor(Math.random()*TYPE_KEYS.length)];
  const r = rollRarityGeneric(vault, 'gachaPity');
  vault.pullCounts[r.key] = (vault.pullCounts[r.key]||0) + 1;
  const name = TYPES[key].name;
  if (!vault.charUnlock[key]){
    vault.charUnlock[key] = true;
    return { kind:'char', key, rar:r.key, unlocked:true, delta:0, msg:'獲得角色卡「'+name+'」('+r.key+')!已解鎖,可於編隊上場' };
  }
  const delta = CHAR_EXP_ON_DUP[r.key];
  vault.charExp[key] = (vault.charExp[key]||0) + delta;
  return { kind:'char', key, rar:r.key, unlocked:false, delta, msg:'獲得角色卡「'+name+'」('+r.key+'),重複轉換 EXP +'+delta };
}
// 寵物碎片:抽到隨機寵物(貓/狐/蛙)× 隨機稀有度的碎片 ×2,合成另見 craftPet()。
function drawPetShard(){
  const species = PET_SPECIES[Math.floor(Math.random()*PET_SPECIES.length)];
  const r = rollRarityGeneric(vault, 'gachaPity');
  vault.pullCounts[r.key] = (vault.pullCounts[r.key]||0) + 1;
  const gained = 2;
  vault.petShards[species][r.key] = (vault.petShards[species][r.key]||0) + gained;
  const nm = GEAR_TABLE.pet.species[species].name;
  return { kind:'pet', key:species, rar:r.key, delta:gained, shards:vault.petShards[species][r.key], msg:'獲得'+nm+' '+r.key+' 碎片 ×'+gained+'(現有 '+vault.petShards[species][r.key]+' 片)' };
}
// 裝備:weapon/charm 沿用 drawGearCore 內核(pet 類不在此分類池,由碎片合成取代直抽)。
function drawEquip(){
  const { item, equipped, refund, rar } = drawGearCore(['weapon','charm'], vault, 'gachaPity');
  const msg = equipped ? ('獲得 '+gearItemLabel(item)+'!'+(refund?'舊裝備分解 +'+refund+'💎':'已裝備')) : ('獲得 '+gearItemLabel(item)+',較弱,已分解 +'+refund+'💎');
  return { kind:'equip', key:item.cat, rar, star:item.star, value:item.value, equipped, refund, delta:refund, msg };
}
// 純擲卡核心(不扣鑽石):gachaOnce/gachaTen 共用,先擲類型(40/30/30)再擲對應分支。
function gachaDrawCore(){
  const type = weightedPick(GACHA_TYPE_WEIGHTS).key;
  if (type==='char') return drawCharCard();
  if (type==='petShard') return drawPetShard();
  return drawEquip();
}
// 單抽 20💎:出貨類型 40/30/30,回傳結構化結果(供 UI 渲染:{kind,key,rar,delta,msg,...})。
function gachaOnce(){
  if (vault.diamonds < GACHA_COST){ vaultMsg('鑽石不夠!(需 '+GACHA_COST+'💎)'); beep(160,.15,'sawtooth'); return null; }
  vault.diamonds -= GACHA_COST;
  const result = gachaDrawCore();
  saveVault();
  vaultMsg(result.msg);
  renderVault();
  const rare = result.rar==='SR'||result.rar==='SSR';
  beep(rare?720:520, rare?.2:.12, 'triangle', .05, rare?1080:780);
  return result;
}
// 十連 180💎(9 折):逐次呼叫 gachaDrawCore,保底計數器(vault.gachaPity)在 10 抽間持續累計不重置,
// 因此任何連續 10 抽必至少 1 次 SR+(≧R+)。回傳 10 筆結果陣列。
function gachaTen(){
  if (vault.diamonds < GACHA_TEN_COST){ vaultMsg('鑽石不夠!(需 '+GACHA_TEN_COST+'💎)'); beep(160,.15,'sawtooth'); return []; }
  vault.diamonds -= GACHA_TEN_COST;
  const results = [];
  for (let i=0;i<10;i++) results.push(gachaDrawCore());
  saveVault();
  const rareCount = results.filter(r=>r.rar==='SR'||r.rar==='SSR').length;
  vaultMsg('十連抽完成!('+rareCount+' 隻 SR 以上)');

// 寵物碎片合成(PLAN S1):門檻 N10/R20/SR40/SSR80,扣碎片後走「取最強/分解返 10💎」邏輯。
function craftPet(species, rar){
  if (!PET_SPECIES.includes(species) || !PET_SHARD_CRAFT_THRESH[rar]) return { ok:false, msg:'無效寵物或稀有度' };
  const need = PET_SHARD_CRAFT_THRESH[rar];
  const have = (vault.petShards[species] && vault.petShards[species][rar]) || 0;
  if (have < need) return { ok:false, msg:'碎片不足('+have+'/'+need+')' };
  vault.petShards[species][rar] -= need;
  const star = RARITY.find(x=>x.key===rar).star;
  const idx = star - 1;
  const item = { cat:'pet', species, rarity:rar, star, value:GEAR_TABLE.pet.species[species].values[idx] };
  const old = vault.gear.pet;
  let equipped, refund = 0;
  if (isGearStronger(item, old)){
    vault.gear.pet = item; equipped = true;
    if (old) refund = GEAR_DISASSEMBLE_REFUND;
  } else {
    refund = GEAR_DISASSEMBLE_REFUND; equipped = false;
  }
  if (refund) vault.diamonds += refund;
  saveVault();
  const msg = equipped ? ('合成 '+gearItemLabel(item)+' 成功!'+(refund?'舊寵物分解 +'+refund+'💎':'已裝備')) : ('合成 '+gearItemLabel(item)+',較弱,已分解 +'+refund+'💎');
  vaultMsg(msg);
  renderVault();
  return { ok:true, equipped, refund, item, msg };
}

/* ---------- 人物等級系統(PLAN S2) ---------- */
const CHAR_LVL_CAP = 20;
// 從 lvl 升到 lvl+1 所需 EXP = round(30 × 1.25^(lvl-1))
function charExpToNext(lvl){ return Math.round(30*Math.pow(1.25, lvl-1)); }
// 依 vault.charExp[key] 累計 EXP 換算目前等級(1-20,滿級不再消耗多餘 EXP)
function charLevel(key){
  let exp = vault.charExp[key]||0, lvl = 1;
  while (lvl < CHAR_LVL_CAP){
    const need = charExpToNext(lvl);
    if (exp < need) break;
    exp -= need; lvl++;
  }
  return lvl;
}
// 供 Step2 EXP 條使用:目前等級、等級內已累積 EXP、升下一級所需 EXP(滿級為 0)
function charLevelProgress(key){
  let exp = vault.charExp[key]||0, lvl = 1;
  while (lvl < CHAR_LVL_CAP){
    const need = charExpToNext(lvl);
    if (exp < need) break;
    exp -= need; lvl++;
  }
  const need = lvl<CHAR_LVL_CAP ? charExpToNext(lvl) : 0;
  return { lvl, exp, need };
}
function charMilestones(lvl){ return Math.floor(lvl/5); } // 5/10/15/20 → 1/2/3/4
// 傷害倍率:1 + 0.02×等級 + 0.05×里程碑數(Lv5=1.15、Lv20=1.60)。掛在 gearDmg 之後乘。
function charDmgMul(key){
  if (!vault.charUnlock[key]) return 1; // 未解鎖角色理論上不會被召喚,防禦性回傳基準值
  const lvl = charLevel(key);
  return 1 + 0.02*lvl + 0.05*charMilestones(lvl);
}
function vaultMsg(t){ const el=document.getElementById('vaultMsg'); if (el) el.textContent = t; }
function renderVault(){
  const dEl = document.getElementById('vaultDiamonds'); if (dEl) dEl.textContent = '💎 鑽石:'+vault.diamonds;
  const row = document.getElementById('vaultGearRow');
  if (row){
    row.innerHTML = '';
    GEAR_CATS.forEach(cat=>{
      const it = vault.gear[cat];
      const label = cat==='pet' ? '寵物' : GEAR_TABLE[cat].name;
      const icon = cat==='pet' ? (it?GEAR_TABLE.pet.species[it.species].icon:'🐾') : GEAR_TABLE[cat].icon;
      let desc;
      if (!it) desc = '尚未持有';
      else if (cat==='weapon') desc = it.rarity+' 全隊傷害 +'+Math.round(it.value*100)+'%';
      else if (cat==='charm') desc = it.rarity+' 城堡上限 +'+it.value;
      else desc = it.rarity+' '+GEAR_TABLE.pet.species[it.species].name+' '+GEAR_TABLE.pet.species[it.species].desc+' +'+Math.round(it.value*100)+'%';
      const div = document.createElement('div'); div.className = 'gearCard';
      div.innerHTML = '<span class="ic">'+icon+'</span><span>'+label+'<small>'+desc+'</small></span>';
      row.appendChild(div);
    });
  }
  const ratesEl = document.getElementById('vaultRates');
  if (ratesEl) ratesEl.textContent = '角色40% 碎片30% 裝備30% ・ 保底:'+(PITY-vault.gachaPity)+' 抽內必出 SR+';
}

/* ---------- diversity bonus (職業羈絆) ---------- */
// 場上不同兵種種類數(support 算一種):>=4 種 +10% 傷害,6 種全滿 +20%(取高不疊加)
function computeDiversity(){
  const clsSet = new Set();
  SLOTS.forEach(s=>{ if (s.unit) clsSet.add(TYPES[s.unit.type].cls); });
  const count = clsSet.size;
  let bonus = 0;
  if (count>=6) bonus = 0.20; else if (count>=4) bonus = 0.10;
  return { count, bonus };
}

  beep(rating==='S'?880:rating==='A'?700:rating==='B'?560:420, .3, 'triangle', .06, rating==='S'?1200:900);
}

/* ---------- 關卡模式結算(PLAN S3) ---------- */
// 依通關時牆血給星:≥9 → 3 星|5-8 → 2 星|1-4 → 1 星|失敗(呼叫前提是有守住,castle<=0 由 gameOver 另外處理)→ 0 星
function stageStars(castleHp){
  if (castleHp>=9) return 3;
  if (castleHp>=5) return 2;
  if (castleHp>=1) return 1;
  return 0;
}
// 第 10 波清完觸發:首通 20+關卡×2💎;首次三星額外 +15💎;非首通 = 現行章節鑽石規則(CHAPTER_DIAMONDS)減半。
function settleStage(){
  const stage = st.stageMode;
  const stars = stageStars(st.castle);
  const prevStars = stages[stage]||0;
  const isFirstClear = prevStars===0;
  const reachesTriple = stars>=3 && prevStars<3;
  let reward = 0;
  if (stars>0){
    reward = isFirstClear ? (20+stage*2) : Math.floor(CHAPTER_DIAMONDS[chapterRating(st.castle)]/2);
    if (reachesTriple) reward += 15;
  }
  if (stars>prevStars) stages[stage] = stars;
  saveStages();
  vault.diamonds += reward; saveVault();
  st.mode = 'stagecleared';
  st.stageResult = { stage, stars, reward, castle:st.castle, isFirstClear, reachesTriple };
  beep(stars>=3?880:stars===2?700:560, .3, 'triangle', .06, stars>=3?1200:900);
  return st.stageResult;
}

/* ---------- waves ---------- */
function waveHp(w){ return 8*Math.pow(1.33,w); }
// 關卡模式波血係數:×1.15^(關卡-1)(無盡模式 stageMode=null 時原樣不變)
function effectiveWaveHp(w){
  const base = waveHp(w);
  return st.stageMode ? base*Math.pow(1.15, st.stageMode-1) : base;
}
function startWave(){
  st.wave++; st.inWave = true;
  st.waveLeft = Math.min(6 + st.wave*2, 34);
  st.spawnT = 0;
  if (st.wave % 5 === 0) st.waveLeft = Math.max(4, Math.floor(st.waveLeft*.5));
}
function spawnEnemy(){
  const boss = (st.wave % 5 === 0 && st.waveLeft === 1);
  const hp = effectiveWaveHp(st.wave) * (boss?12:1);
  st.enemies.push({
    x: 20+Math.random()*(W-40), y:-30, hp, maxHp:hp,
    speed:(38 + Math.min(st.wave*1.2, 30)) * (boss?.6:1),
    boss, wob:Math.random()*7, dead:false,
    slow:null, poison:[], poisonTickT:.5
  });
}

/* ---------- helpers ---------- */
function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
function floatTxt(x,y,txt,col,size){ st.floats.push({x,y,txt,col,size:size||13,t:0}); }
function puff(x,y,col,n){ for(let i=0;i<(n||7);i++) st.puffs.push({x,y,vx:(Math.random()-.5)*130,vy:(Math.random()-.5)*130-30,t:0,col}); }

/* ---------- summon & merge ---------- */
function trySummon(){
  if (st.coins < st.summonCost) { floatTxt(W/2, H-135, '金幣不夠!', '#FF7B5C', 15); beep(160,.15,'sawtooth'); return; }
  const empty = SLOTS.filter(s=>!s.unit);
  if (!empty.length) { floatTxt(W/2, H-135, '沒空位了,先合體!', '#FF7B5C', 15); beep(160,.15,'sawtooth'); return; }
  st.coins -= st.summonCost; st.summonCost += 2;
  const slot = empty[Math.floor(Math.random()*empty.length)];
  const type = pickType();
  const rar = rollRarity();
  slot.unit = { type, lvl:rar.startLvl, cd:0, pop:.45, star:rar.star, mul:rar.mul, rarCol:rar.col };
  puff(slot.x, slot.y, rar.col, rar.star>=3?12:7);
  floatTxt(slot.x, slot.y-34, rar.key, rar.col, rar.star>=3?18:14);
  beep(rar.star>=3?720:520, rar.star>=3?.2:.12, 'triangle', .05, rar.star>=3?1080:780);
}
function tapSlot(i){
  const s = SLOTS[i];
  if (st.sel === -1){
    if (s.unit){ st.sel = i; beep(440,.06,'sine'); }
    return;
  }
  if (st.sel === i){ st.sel = -1; return; }
  const a = SLOTS[st.sel], b = s;
  if (a.unit && b.unit && a.unit.type===b.unit.type && a.unit.lvl===b.unit.lvl && a.unit.lvl<6){
    // 肉鴿核心:合成結果變成編隊中「隨機另一個角色」(排除原 key),lvl+1,稀有度取兩隻中較高者
    const star = Math.max(a.unit.star, b.unit.star);
    const mul  = Math.max(a.unit.mul,  b.unit.mul);
    const rarCol = a.unit.mul>b.unit.mul ? a.unit.rarCol : b.unit.rarCol;
    const pool = deck.filter(k=>k!==a.unit.type);
    const newType = pool.length ? pool[Math.floor(Math.random()*pool.length)] : a.unit.type;
    b.unit.type = newType;
    b.unit.lvl++;
    b.unit.pop = .45;
    b.unit.star = star;
    b.unit.mul = mul;
    b.unit.rarCol = rarCol;
    a.unit = null;
    puff(b.x, b.y, '#FFC94D', 12);
    floatTxt(b.x, b.y-34, '→ '+TYPES[newType].name+' Lv'+b.unit.lvl+'!', '#FFC94D', 15);
    beep(620,.16,'triangle',.06,930);
  } else if (b.unit){ st.sel = i; beep(440,.06,'sine'); return; }
  st.sel = -1;
}

/* ---------- update ---------- */
function update(dt){
  st.t += dt;
  // 章節橫幅計時獨立於 mode,即使圖騰選單蓋在上面也持續倒數,不卡住下一步流程
  if (st.chapterBanner){ st.chapterBanner.t += dt; if (st.chapterBanner.t>2) st.chapterBanner=null; }
  if (st.mode!=='play') return;
  st.diversity = computeDiversity();

  // 防卡死自動擴格:每 0.5 秒節流檢查一次,全滿且無可合成對就擴一格。
  st.deadlockT -= dt;
  if (st.deadlockT<=0){
    st.deadlockT = 0.5;
    if (isDeadlocked()){
      if (!grantExtraSlot()) forcedReroll();
    }
  }

  // wave flow
  if (st.inWave){
    if (st.waveLeft>0){
      st.spawnT -= dt;
      if (st.spawnT<=0){ spawnEnemy(); st.waveLeft--; st.spawnT = st.wave%5===0 && st.waveLeft===0 ? .9 : Math.max(.35, .95 - st.wave*.02); }
    } else if (!st.enemies.length){
      st.inWave=false; st.betweenT=2.2;
      const bonus=Math.round((14+st.wave*2)*st.buff.coin);
      st.coins+=bonus; floatTxt(W/2,300,'波次獎勵 +'+bonus+' 💰','#FFC94D',17);
      beep(560,.2,'triangle',.05,840);
      if (st.stageMode){
        // 關卡模式:固定 10 波,第 10 波清完直接結算(不進入無盡章節評級),期間仍照樣提供圖騰
        if (st.wave>=10){ settleStage(); }
        else if (st.wave%5===0) offerTotems();
      } else {
        if (st.wave%5===0) offerTotems();
        if (st.wave%10===0) settleChapter();
      }
    }
  } else {
    st.betweenT-=dt;
    if (st.betweenT<=0) startWave();
  }

  // enemies:從頂部往下壓,撞牆(y>=WALL_TOP)扣血後消失(普通1/Boss3),冰法減速作用於下降速度
  for (const e of st.enemies){
    if (e.y >= WALL_TOP){
      e.dead = true;
      const dmgToWall = e.boss ? 3 : 1;
      st.castle -= dmgToWall;
      st.shake = .35;
      beep(120,.3,'sawtooth',.07);
      floatTxt(e.x, WALL_TOP-10, '-'+dmgToWall+' 🏰', '#FF5A5A', 18);
      if (st.castle<=0) gameOver();
      continue;
    }
    const slowMul = (e.slow && st.t<e.slow.until) ? (1-e.slow.frac) : 1;
    e.y += e.speed*slowMul*dt;
  }
  st.enemies=st.enemies.filter(e=>!e.dead);

  // status effects: 毒 tick(每 0.5 秒結算一次,滿層時最舊一層已在 applyPoison 換掉)
  for (const e of st.enemies){
    if (e.poison && e.poison.length){
      e.poison = e.poison.filter(l=>l.until>st.t);
      if (e.poison.length){
        e.poisonTickT -= dt;
        if (e.poisonTickT<=0){
          e.poisonTickT += .5;
          const total = e.poison.reduce((a,l)=>a+l.dps,0);
          const hasBurst = e.poison.some(l=>l.burst);
          const wasAlive = !e.dead;
          damage(e, total*.5, '#8FE08F');
          // ☠️ 綠牙毒爆:毒殺(DOT 致死)時對其 60px 內敵人各施 1 層毒
          if (wasAlive && e.dead && hasBurst) poisonBurst(e);
        }
      }
    }
  }
  st.enemies=st.enemies.filter(e=>!e.dead);

  // units fire
  for (let si=0; si<SLOTS.length; si++){
    const s=SLOTS[si];
    const u=s.unit; if(!u) continue;
    u.pop=Math.max(0,u.pop-dt*2);
    const T=TYPES[u.type];
    if (T.noAttack) continue; // 😇/🎵 輔助:不攻擊,只提供相鄰光環
    // 🎵 音符攻速光環:鄰居 cd 額外乘上 (1+Σaspd),等效冷卻時間 ÷(1+Σaspd)
    u.cd -= dt*st.buff.spd*(1+auraAspd(si));
    if (u.cd>0) continue;
    // 射程索敵:取「與自身歐氏距離 <= T.range」的敵人清單,每次開火隨機挑一隻;範圍內沒敵人就待機
    const inRange = st.enemies.filter(e=>Math.hypot(e.x-s.x, e.y-s.y) <= T.range);
    if (!inRange.length) continue;
    const best = inRange[Math.floor(Math.random()*inRange.length)];
    u.cd=T.cd;
    // 傷害公式:基礎 × 等級成長 × 星級倍率 × 圖騰buff × 裝備武器buff × 人物等級倍率(PLAN S2)× (1+相鄰😇輔助光環) × (1+職業羈絆加成)
    const aura = auraBuff(si);
    const dmg = T.dmg * LVL_MUL(u.lvl) * (u.mul||1) * st.buff.dmg * st.buff.gearDmg * charDmgMul(u.type) * (1+aura) * (1+st.diversity.bonus);
    if (T.cls==='spark'){
      // ⚡ 瞬時鋸齒閃電:無飛行時間,立即命中,視覺用 lightnings(0.1s 淡出)
      pushLightning({x1:s.x,y1:s.y-14,x2:best.x,y2:best.y,t:0,col:'#FFE97A'});
      hit({x:s.x,y:s.y-14,tgt:best,type:u.type,dmg,lvl:u.lvl});
    } else {
      const speed = T.cls==='archer'?560:T.cls==='ice'?380:T.cls==='poison'?340:430;
      st.projs.push({x:s.x,y:s.y-14,tgt:best,type:u.type,dmg,speed,lvl:u.lvl});
    }
    beep(T.cls==='archer'?900:T.cls==='mage'?300:T.cls==='ice'?520:T.cls==='poison'?260:660,.05,T.cls==='mage'?'sine':'square',.02);
  }

  // projectiles
  for (const p of st.projs){
    if (p.tgt.dead || p.tgt.hp<=0){ p.done=true; continue; }
    const d=Math.hypot(p.tgt.x-p.x,p.tgt.y-p.y);
    if (d<10){ p.done=true; hit(p); continue; }
    p.x+=(p.tgt.x-p.x)/d*p.speed*dt; p.y+=(p.tgt.y-p.y)/d*p.speed*dt;
  }
  st.projs=st.projs.filter(p=>!p.done);

  // fx
  for (const f of st.floats) f.t+=dt;
  st.floats=st.floats.filter(f=>f.t<1);
  for (const q of st.puffs){ q.t+=dt; q.x+=q.vx*dt; q.y+=q.vy*dt; q.vy+=160*dt; }
  st.puffs=st.puffs.filter(q=>q.t<.55);
  for (const l of st.lightnings) l.t+=dt;
  st.lightnings=st.lightnings.filter(l=>l.t<0.1);
  st.shake=Math.max(0,st.shake-dt);
}

// 元素配色(傷害浮字 + 命中特效共用):火/冰/毒/電/箭
const ELEM_COLOR = { archer:'#FFF3D6', mage:'#FF9C50', spark:'#FFE97A', ice:'#9FD8FF', poison:'#8FE08F' };
// 粒子總量上限(puffs+lightnings 共用預算),防止長時間連鎖/多重命中時效能崩潰
const MAX_PARTICLES = 200;
function totalParticles(){ return st.puffs.length + st.lightnings.length; }
function capPush(arr, item){ if (totalParticles()>=MAX_PARTICLES && st.puffs.length) st.puffs.shift(); arr.push(item); }
function puffN(x,y,col,n,shape){ for (let i=0;i<n;i++) capPush(st.puffs, {x,y,vx:(Math.random()-.5)*130,vy:(Math.random()-.5)*130-30,t:0,col,shape:shape||'circle'}); }
function pushLightning(l){ if (st.lightnings.length>=60) st.lightnings.shift(); st.lightnings.push(l); }
// 元素命中特效(手繪 canvas,無新資源):箭=白閃、火=橘色爆圈、電=黃白閃、冰=六角冰花碎裂、毒=綠濺滴
function elemHitFx(x,y,cls){
  if (cls==='archer') capPush(st.puffs, {x,y,vx:0,vy:0,t:0,col:'#FFFFFF',shape:'flash'});
  else if (cls==='mage') puffN(x,y,'#FF9C50',8,'circle');
  else if (cls==='spark') capPush(st.puffs, {x,y,vx:0,vy:0,t:0,col:'#FFF6C0',shape:'flash'});
  else if (cls==='ice') puffN(x,y,'#9FD8FF',4,'shard');
  else if (cls==='poison') puffN(x,y,'#8FE08F',6,'drip');
}
function hit(p){
  const T=TYPES[p.type];
  damage(p.tgt,p.dmg, ELEM_COLOR[T.cls]);
  elemHitFx(p.tgt.x, p.tgt.y, T.cls);
  if (T.splash){ for (const e of st.enemies){ if (e!==p.tgt && !e.dead && Math.hypot(e.x-p.tgt.x,e.y-p.tgt.y)<=T.splash) damage(e,p.dmg*(T.splashMul!=null?T.splashMul:.6), ELEM_COLOR.mage); } puffN(p.tgt.x,p.tgt.y,'#FF9C50',6,'circle'); }
  if (T.chain){ const decay = T.chainDecay!=null?T.chainDecay:.65; let src=p.tgt,n=T.chain,dmg=p.dmg*decay,hitset=new Set([p.tgt]);
    while(n-->0){ let nx=null,nd=95;
      for (const e of st.enemies){ if(!hitset.has(e)&&!e.dead){ const d=Math.hypot(e.x-src.x,e.y-src.y); if(d<nd){nd=d;nx=e;} } }
      if(!nx)break; damage(nx,dmg,ELEM_COLOR.spark); hitset.add(nx);
      pushLightning({x1:src.x,y1:src.y,x2:nx.x,y2:nx.y,t:0,col:'#FFE97A'});
      elemHitFx(nx.x,nx.y,'spark');
      src=nx; dmg*=decay; }
  }
  if (T.slow && !p.tgt.dead) applySlow(p.tgt, p.lvl, T);
  if (T.poison && !p.tgt.dead) applyPoison(p.tgt, p.dmg, T.poisonCap, T.poisonBurst);
}
// ❄️ 冰系減速:命中刷新持續時間、同不疊加取最強;Boss 減速減半;寒霜圖騰可拉高上限與加成;各角色 slowBase/slowPerLvl 不同
function applySlow(e, lvl, T){
  let frac = Math.min(st.buff.frostCap, (T.slowBase!=null?T.slowBase:.20)+(T.slowPerLvl!=null?T.slowPerLvl:.05)*lvl+st.buff.frostBonus);
  frac = Math.min(frac, 0.70); // 絕對上限:即使寒霜圖騰+冰狐寵物疊加,總減速仍不超過 70%
  if (e.boss) frac *= 0.5;
  const active = e.slow && st.t < e.slow.until;
  const newFrac = active ? Math.max(e.slow.frac, frac) : frac;
  e.slow = { frac:newFrac, until:st.t+1.5 };
}
function addPoisonLayer(e, layer, cap){
  e.poison = (e.poison||[]).filter(l=>l.until>st.t);
  if (e.poison.length>=cap){
    let oldestIdx=0, oldestUntil=e.poison[0].until;
    for (let k=1;k<e.poison.length;k++){ if (e.poison[k].until<oldestUntil){ oldestUntil=e.poison[k].until; oldestIdx=k; } }
    e.poison[oldestIdx]=layer;
  } else {
    e.poison.push(layer);
  }
  if (e.poisonTickT===undefined) e.poisonTickT=.5;
}
// ☠️ 毒系疊毒:每層 3 秒,單一敵人上限依角色(夜影 5 / 綠牙 3,瘟疫圖騰 +2),滿層時刷新最舊一層;burst 標記供毒爆判定
function applyPoison(e, hitDmg, capBase, burst){
  const cap = (capBase!=null?capBase:5) + (st.buff.poisonCapBonus||0);
  addPoisonLayer(e, { dps: hitDmg*0.6*(st.buff.poisonDmgMul||1), until: st.t+3, burst: !!burst }, cap);
}
// ☠️ 綠牙毒爆:毒殺(DOT 致死)時,對死亡敵人 60px 內的其他敵人各施 1 層毒(沿用致死那層的 dps)
function poisonBurst(e){
  const src = e.poison.find(l=>l.burst);
  const dps = src ? src.dps : 1;
  const cap = 3 + (st.buff.poisonCapBonus||0);
  for (const o of st.enemies){
    if (o===e || o.dead) continue;
    if (Math.hypot(o.x-e.x, o.y-e.y) <= 60){
      addPoisonLayer(o, { dps, until: st.t+3, burst:true }, cap);
      floatTxt(o.x, o.y-16, '☣️', '#8FE08F', 11);
    }
  }
  floatTxt(e.x, e.y-30, '☣️ 毒爆!', '#8FE08F', 14);
}
function damage(e,d,col){
  e.hp-=d;
  floatTxt(e.x+(Math.random()*16-8), e.y-22, Math.round(d), col||'#FFF3D6', e.boss?15:12);
  if (e.hp<=0 && !e.dead){
    e.dead=true;
    const c=Math.round((2+st.wave*.6)*(e.boss?10:1)*st.buff.coin*st.buff.gearCoin);
    st.coins+=c;
    floatTxt(e.x,e.y-8,'+'+c+'💰','#FFC94D',e.boss?18:13);
    puff(e.x,e.y,e.boss?'#FF9C6B':'#B7E3A1',e.boss?18:8);
    beep(e.boss?200:340,e.boss?.35:.09,'triangle',.05,e.boss?90:220);
  }
}
function gameOver(){
  if (st.stageMode){
    // 關卡模式失敗:無星、不計無盡模式存活波數獎勵/章節log;失敗畫面由 Step2 UI 依 st.stageResult 顯示。
    st.mode = 'stagefailed';
    st.stageResult = { stage:st.stageMode, stars:0, reward:0, castle:st.castle, failed:true };
    return;
  }
  st.mode='over';
  if (st.wave>st.best){ st.best=st.wave; localStorage.setItem('kdp_best',st.best); }
  // game over 額外結算:鑽石 += floor(存活波數 × 1.5),直接存入寶庫
  const waveBonus = Math.floor(st.wave*1.5);
  vault.diamonds += waveBonus; saveVault();
  document.getElementById('finalWave').textContent=st.wave;
  document.getElementById('bestLine').textContent='最佳紀錄:'+st.best+' 波';
  const listEl = document.getElementById('chapterList');
  if (listEl){
    let html = st.chapterLog.map(c=>'第'+c.chapter+'章:評級 '+c.rating+'(城堡血'+c.castle+')+'+c.reward+'💎').join('<br>');
    if (html) html += '<br>';
    html += '存活獎勵 +'+waveBonus+'💎 ・ 目前鑽石 💎'+vault.diamonds;
    listEl.innerHTML = html;
  }
  document.getElementById('over').classList.remove('hidden');
}

/* ---------- draw ---------- */
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function draw(){
  ctx.save();
  if (st.shake>0) ctx.translate((Math.random()-.5)*8*st.shake,(Math.random()-.5)*8*st.shake);

  // sky→battlefield (上方 2/3+ 畫面 = 戰場,天空/地面漸層,銜接城牆頂緣)
  const g=ctx.createLinearGradient(0,0,0,WALL_TOP);
  g.addColorStop(0,'#8FD8CF'); g.addColorStop(.45,'#BDE9D2'); g.addColorStop(.7,'#A8DA82'); g.addColorStop(1,'#8FCB6B');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,WALL_TOP);
  // clouds
  ctx.fillStyle='rgba(255,255,255,.75)';
  [[70,60,26],[290,44,20],[350,95,15]].forEach(([x,y,r],i)=>{
    const ox=Math.sin(st.t*.25+i*2)*8;
    ctx.beginPath(); ctx.arc(x+ox,y,r,0,7); ctx.arc(x+ox+r*.9,y+4,r*.75,0,7); ctx.arc(x+ox-r*.9,y+5,r*.7,0,7); ctx.fill();
  });

  // 城牆(雉堞造型):牆體矩形 + 垛口方塊
  ctx.fillStyle='#C9B48B'; ctx.fillRect(0,WALL_TOP,W,WALL_BOTTOM-WALL_TOP);
  ctx.fillStyle='rgba(0,0,0,.12)'; ctx.fillRect(0,WALL_TOP,W,6);
  ctx.fillStyle='#B5A07A';
  for (let mx=6; mx<W; mx+=40){ ctx.fillRect(mx,WALL_TOP-14,24,14); }
  ctx.fillStyle='rgba(0,0,0,.08)';
  for (let lx=0; lx<W; lx+=20){ ctx.fillRect(lx,WALL_TOP+22,1,WALL_BOTTOM-WALL_TOP-22); }

  // 牆血條(牆帶正下方,綠色)
  ctx.fillStyle='rgba(0,0,0,.28)'; rr(14,WALL_BOTTOM+1,W-28,7,3); ctx.fill();
  ctx.fillStyle='#6FBF73'; rr(14,WALL_BOTTOM+1,(W-28)*Math.max(0,st.castle/st.castleMax),7,3); ctx.fill();

  ctx.textAlign='center'; ctx.textBaseline='middle';
  // 已裝備寵物小圖示(寶庫裝備,開局注入),畫在牆旁
  if (st.pet){
    ctx.font='22px serif';
    ctx.fillText(GEAR_TABLE.pet.species[st.pet.species].icon, PET_ICON.x, PET_ICON.y);
  }

  // 射程弧:點選單位時顯示半透明射程範圍,裁切在戰場區(避免蓋到城牆/UI)
  if (st.sel>=0 && SLOTS[st.sel] && SLOTS[st.sel].unit){
    const su = SLOTS[st.sel], sT = TYPES[su.unit.type];
    if (sT.range>0){
      ctx.save();
      ctx.beginPath(); ctx.rect(0,0,W,WALL_TOP); ctx.clip();
      ctx.globalAlpha=.12; ctx.fillStyle='#FFF3D6';
      ctx.beginPath(); ctx.arc(su.x, su.y, sT.range, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha=.55; ctx.strokeStyle='#FF9C50'; ctx.lineWidth=2; ctx.setLineDash([8,6]);
      ctx.beginPath(); ctx.arc(su.x, su.y, sT.range, 0, Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
      ctx.restore();
    }
  }

  // slots & units
  // 間距用「第一排格數」算(第二排疊在上方不佔橫向空間);裝飾尺寸隨間距縮,避免最右格戳出畫布
  const pitch = W/Math.min(SLOTS.length, ROW1_MAX);
  const box = Math.min(52, pitch-2), bf = box/52;
  SLOTS.forEach((s,i)=>{
    if (s.row===2){
      // 第二排底座:小石台,視覺上連到下方第一排格
      ctx.fillStyle='#9C8A66'; rr(s.x-15*bf,s.y+24,30*bf,32,6); ctx.fill();
      ctx.fillStyle='rgba(0,0,0,.15)'; rr(s.x-15*bf,s.y+24,30*bf,6,3); ctx.fill();
    }
    ctx.fillStyle='rgba(255,255,255,.35)';
    rr(s.x-box/2,s.y-box/2,box,box,14*bf); ctx.fill();
    if (st.sel===i){
      ctx.strokeStyle='#FF7B5C'; ctx.lineWidth=3; rr(s.x-box/2-2,s.y-box/2-2,box+4,box+4,15*bf); ctx.stroke();
    }
  });
  // 單位分層:第二排先畫、第一排後畫(第一排是前景),避免石台/上排單位蓋住下排貓
  const unitOrder=[...SLOTS.keys()].sort((a,b)=>(SLOTS[a].row===2?0:1)-(SLOTS[b].row===2?0:1));
  for (const i of unitOrder){
    const s=SLOTS[i];
    const u=s.unit; if(!u) continue;
    const T=TYPES[u.type];
    const wob=Math.sin(st.t*3+i)*2, pop=1+u.pop*.5;
    // 😇/🎵 輔助光環:被 buff 槽位淡金色光暈
    if (auraBuff(i)>0 || auraAspd(i)>0){
      ctx.save(); ctx.globalAlpha=.4; ctx.fillStyle='#FFE9A8';
      ctx.beginPath(); ctx.ellipse(s.x,s.y+4,26*pop*bf,24*pop*bf,0,0,7); ctx.fill(); ctx.restore();
    }
    // rarity ring
    if (u.star>=3){ ctx.strokeStyle=u.rarCol; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.ellipse(s.x,s.y+4,21*pop*bf,19*pop*bf,0,0,7); ctx.stroke(); }
    // 立繪(Q版貓咪英雄 sprite):等比縮放,腳底貼牆帶頂緣,水平置中於槽位;圖片未 loaded 時 fallback 畫原 emoji
    const simg = SPRITE_IMGS[u.type];
    if (simg && simg.complete && simg.naturalWidth>0){
      const baseSH = Math.min(46, pitch-4);
      const sh = baseSH*pop, sw = sh*(simg.naturalWidth/simg.naturalHeight);
      const feetY = s.y+22+wob*.3;
      ctx.drawImage(simg, s.x-sw/2, feetY-sh, sw, sh);
    } else {
      // body (fallback)
      ctx.fillStyle=T.body;
      ctx.beginPath(); ctx.ellipse(s.x,s.y+4+wob*.3,19*pop,17*pop,0,0,7); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.28)';
      ctx.beginPath(); ctx.ellipse(s.x-5,s.y-2+wob*.3,7*pop,5*pop,0,0,7); ctx.fill();
      // face (fallback)
      ctx.font=(20*pop)+'px serif'; ctx.fillText(T.face,s.x,s.y-14+wob);
    }
    // star pips (rarity)
    ctx.fillStyle=u.rarCol||'#AEB9C4'; ctx.font='9px sans-serif';
    let stars=''; for(let k=0;k<(u.star||1);k++) stars+='★';
    ctx.fillText(stars, s.x, s.y-30);
    // level badge
    const bx = Math.min(s.x+8, W-24);
    ctx.fillStyle='#2E5648'; rr(bx,s.y+10,22,15,7); ctx.fill();
    ctx.fillStyle='#FFC94D'; ctx.font='bold 10.5px sans-serif'; ctx.fillText('Lv'+u.lvl,bx+11,s.y+18);
  }

  // enemies
  for (const e of st.enemies){
    const r=e.boss?26:14, wob=Math.sin(st.t*7+e.wob)*2.4;
    const slowed = e.slow && st.t<e.slow.until;
    const poisoned = e.poison && e.poison.length;
    ctx.fillStyle='rgba(0,0,0,.12)';
    ctx.beginPath(); ctx.ellipse(e.x,e.y+r*.85,r*.8,r*.3,0,0,7); ctx.fill();
    // ❄️ 減速淡藍色調
    if (slowed){ ctx.save(); ctx.globalAlpha=.38; ctx.fillStyle='#8FD3E8';
      ctx.beginPath(); ctx.arc(e.x,e.y,r*1.15,0,7); ctx.fill(); ctx.restore(); }
    // ☠️ 中毒綠色調
    if (poisoned){ ctx.save(); ctx.globalAlpha=.32; ctx.fillStyle='#6FBF73';
      ctx.beginPath(); ctx.arc(e.x,e.y,r*1.02,0,7); ctx.fill(); ctx.restore(); }
    const eimg = SPRITE_IMGS[e.boss?'enemy_boss':'enemy_mob'];
    if (eimg && eimg.complete && eimg.naturalWidth>0){
      const eh=(e.boss?72:38), ew=eh*(eimg.naturalWidth/eimg.naturalHeight);
      ctx.drawImage(eimg, e.x-ew/2, e.y-eh/2+wob, ew, eh);
    } else {
      ctx.font=(e.boss?46:26)+'px serif';
      ctx.fillText(e.boss?'👹':'👺',e.x,e.y+wob);
    }
    if (slowed){ ctx.font='13px sans-serif'; ctx.fillText('❄',e.x+r*.75,e.y-r*.6); }
    if (poisoned){ ctx.fillStyle='#1F3D33'; ctx.font='bold 10px sans-serif'; ctx.fillText(''+e.poison.length,e.x-r*.75,e.y-r*.6); }
    // hp bar
    const bw=e.boss?46:26;
    ctx.fillStyle='rgba(0,0,0,.25)'; rr(e.x-bw/2,e.y-(e.boss?36:24),bw,4.5,2); ctx.fill();
    ctx.fillStyle=e.boss?'#FF6B81':'#8BE28F'; rr(e.x-bw/2,e.y-(e.boss?36:24),bw*Math.max(0,e.hp/e.maxHp),4.5,2); ctx.fill();
  }

  // projectiles(依職業手繪外觀:箭矢/火球+尾焰/冰晶/毒球擺動;⚡瞬時閃電改走 lightnings,不在此繪製)
  for (const p of st.projs){
    const T = TYPES[p.type], cls = T.cls;
    const ang = Math.atan2(p.tgt.y-p.y, p.tgt.x-p.x);
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(ang);
    if (cls==='archer'){
      ctx.strokeStyle=T.proj; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(-8,0); ctx.lineTo(8,0); ctx.stroke();
      ctx.fillStyle=T.proj; ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(3,-3); ctx.lineTo(3,3); ctx.closePath(); ctx.fill();
    } else if (cls==='mage'){
      ctx.fillStyle=T.proj; ctx.beginPath(); ctx.arc(0,0,6,0,7); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.5)'; ctx.beginPath(); ctx.arc(-2,-1,2.4,0,7); ctx.fill();
    } else if (cls==='ice'){
      ctx.fillStyle=T.proj;
      ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(5,0); ctx.lineTo(0,6); ctx.lineTo(-5,0); ctx.closePath(); ctx.fill();
    } else if (cls==='poison'){
      const wob=Math.sin(st.t*10+p.x*.1)*2;
      ctx.fillStyle=T.proj; ctx.beginPath(); ctx.arc(0,wob,5,0,7); ctx.fill();
    } else {
      ctx.fillStyle=T.proj; ctx.beginPath(); ctx.arc(0,0,4,0,7); ctx.fill();
    }
    ctx.restore();
    if (cls==='mage' && Math.random()<.5) puffN(p.x-Math.cos(ang)*6, p.y-Math.sin(ang)*6, 'rgba(255,156,80,.7)', 1, 'ember');
  }

  // lightnings(⚡瞬時鋸齒閃電線,含連鎖分支,0.1s 淡出)
  for (const l of st.lightnings){
    const alpha = Math.max(0, 1-l.t/0.1);
    ctx.save(); ctx.globalAlpha=alpha; ctx.strokeStyle=l.col; ctx.lineWidth=2.4;
    ctx.beginPath();
    const segs=5;
    for (let k=0;k<=segs;k++){
      const tt=k/segs;
      const jitter = (k>0&&k<segs) ? (Math.random()-.5)*14 : 0;
      const mx = l.x1+(l.x2-l.x1)*tt+jitter, my = l.y1+(l.y2-l.y1)*tt+jitter;
      if (k===0) ctx.moveTo(mx,my); else ctx.lineTo(mx,my);
    }
    ctx.stroke(); ctx.restore();
  }

  // puffs(依 shape 手繪:flash 白/黃閃、shard 冰花碎片、drip 毒濺滴、ember 火星尾焰、circle 一般爆圈)
  for (const q of st.puffs){
    ctx.globalAlpha=1-q.t/.55; ctx.fillStyle=q.col;
    if (q.shape==='flash'){
      ctx.beginPath(); ctx.arc(q.x,q.y,9*(1-q.t/.55)+3,0,7); ctx.fill();
    } else if (q.shape==='shard'){
      ctx.save(); ctx.translate(q.x,q.y); ctx.rotate(q.t*4);
      ctx.beginPath(); ctx.moveTo(0,-5); ctx.lineTo(3,0); ctx.lineTo(0,5); ctx.lineTo(-3,0); ctx.closePath(); ctx.fill();
      ctx.restore();
    } else if (q.shape==='drip'){
      ctx.beginPath(); ctx.ellipse(q.x,q.y,3,5,0,0,7); ctx.fill();
    } else if (q.shape==='ember'){
      ctx.beginPath(); ctx.arc(q.x,q.y,2.4,0,7); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(q.x,q.y,4.5,0,7); ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  // float texts
  for (const f of st.floats){
    ctx.globalAlpha=1-f.t; ctx.fillStyle=f.col;
    ctx.font='bold '+f.size+'px sans-serif';
    ctx.fillText(f.txt,f.x,f.y-f.t*26); ctx.globalAlpha=1;
  }

  drawHud();

  // 章節結算橫幅(2 秒淡出,不暫停遊戲)
  if (st.chapterBanner){
    const b=st.chapterBanner;
    const alpha = b.t<1.6 ? 1 : Math.max(0,1-(b.t-1.6)/0.4);
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.font='bold 15px sans-serif';
    const tw=ctx.measureText(b.text).width;
    ctx.fillStyle='rgba(255,201,77,.95)'; rr(W/2-tw/2-16,84,tw+32,38,14); ctx.fill();
    ctx.fillStyle='#2E5648'; ctx.textAlign='center'; ctx.fillText(b.text,W/2,84+23);
    ctx.restore();
  }

  ctx.restore();
  syncStageOverlays();
}

// 關卡模式勝負畫面(PLAN S3 UI):settleStage()/gameOver() 只設定 st.mode/st.stageResult(資料層,不可改),
// 這裡在每幀 draw() 尾端輪詢狀態變化,首次偵測到才渲染+顯示對應 overlay,避免每幀重覆渲染。
let stageOverlayShown = null;
function renderStageClearedBox(){
  const r = st.stageResult;
  const starsEl = document.getElementById('stageClearedStars');
  if (starsEl) starsEl.textContent = '★'.repeat(r.stars)+'☆'.repeat(3-r.stars);
  const rewardEl = document.getElementById('stageClearedReward');
  if (rewardEl){
    let txt = '+'+r.reward+'💎';
    if (r.isFirstClear) txt += '(首通獎勵)';
    if (r.reachesTriple) txt += ' ・ 三星加碼!';
    rewardEl.textContent = txt;
  }
  const nextBtn = document.getElementById('stageNextBtn');
  if (nextBtn) nextBtn.style.display = (r.stage<50) ? '' : 'none';
  const box = document.getElementById('stageClearedBox');
  if (box) box.classList.remove('hidden');
}
function renderStageFailedBox(){
  const r = st.stageResult;
  const el = document.getElementById('stageFailedText');
  if (el) el.textContent = '第 '+r.stage+' 關挑戰失敗…城堡被攻破了';
  const box = document.getElementById('stageFailedBox');
  if (box) box.classList.remove('hidden');
}
function syncStageOverlays(){
  if (st.mode==='stagecleared'){
    if (stageOverlayShown!=='cleared'){ stageOverlayShown='cleared'; renderStageClearedBox(); }
  } else if (st.mode==='stagefailed'){
    if (stageOverlayShown!=='failed'){ stageOverlayShown='failed'; renderStageFailedBox(); }
  } else {
    stageOverlayShown = null;
  }
}

function drawHud(){
  // top bar
  ctx.fillStyle='rgba(31,61,51,.85)'; rr(10,10,W-20,44,14); ctx.fill();
  ctx.textAlign='left'; ctx.fillStyle='#FFF9EA'; ctx.font='bold 16px sans-serif';
  // 關卡模式:HUD 頂部顯示「第 N 關|波 x/10」;無盡模式原樣不變(PLAN S3 UI)
  let waveTxt;
  if (st.stageMode){
    const waveNum = st.inWave ? st.wave : Math.min(st.wave+1, 10);
    waveTxt = '第'+st.stageMode+'關 ・ 波 '+waveNum+'/10';
  } else {
    waveTxt = st.inWave ? '第 '+st.wave+' 波' : (st.wave===0?'準備中…':'第 '+(st.wave+1)+' 波 即將來襲');
  }
  ctx.fillText('🌊 '+waveTxt, 24, 32);
  ctx.textAlign='right';
  ctx.fillStyle='#FFC94D'; ctx.fillText('💰 '+st.coins, W-24, 32);
  ctx.textAlign='center';

  // 職業羈絆徽章:場上兵種種類達門檻才顯示
  if (st.diversity && st.diversity.bonus>0){
    const label = '🔗羈絆×'+st.diversity.count+' +'+Math.round(st.diversity.bonus*100)+'%';
    ctx.font='bold 12.5px sans-serif';
    const tw=ctx.measureText(label).width;
    ctx.fillStyle='rgba(111,191,115,.92)'; rr(W/2-tw/2-12,60,tw+24,24,12); ctx.fill();
    ctx.fillStyle='#fff'; ctx.fillText(label, W/2, 60+15);
  }

  // bottom bar
  ctx.fillStyle='rgba(31,61,51,.85)'; rr(10,H-92,W-20,82,18); ctx.fill();
  // summon button
  const can = st.coins>=st.summonCost && SLOTS.some(s=>!s.unit);
  ctx.fillStyle=can?'#FF7B5C':'#7A6E62'; rr(26,H-80,150,58,16); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 19px sans-serif'; ctx.fillText('召喚英雄',101,H-58);
  ctx.font='bold 13px sans-serif'; ctx.fillText('💰'+st.summonCost,101,H-38);
  // rates + pity (published, like a real gacha banner)
  ctx.textAlign='left';
  ctx.font='11.5px sans-serif';
  ctx.fillStyle='#AEB9C4'; ctx.fillText('N 70%',196,H-66);
  ctx.fillStyle='#6FBF73'; ctx.fillText('R 22%',248,H-66);
  ctx.fillStyle='#7E8FE0'; ctx.fillText('SR 6%',300,H-66);
  ctx.fillStyle='#FFC94D'; ctx.fillText('SSR 2%',352,H-66);
  ctx.fillStyle='rgba(255,249,234,.92)'; ctx.font='12px sans-serif';
  ctx.fillText('保底:'+(PITY-st.pity)+' 抽內必出 SR＋', 196, H-46);
  // 兵種召喚池機率(公開,依編隊 6 隻即時計算):name 前兩字 + 百分比
  ctx.font='9px sans-serif';
  ctx.fillText(deckRateLine(), 196, H-28);
  ctx.textAlign='center';
}

/* ---------- input ---------- */
function toXY(ev){
  const r=cv.getBoundingClientRect();
  const p=ev.touches?ev.touches[0]:ev;
  return { x:(p.clientX-r.left)/r.width*W, y:(p.clientY-r.top)/r.height*H };
}
function tap(ev){
  if (st.mode!=='play') return;
  ev.preventDefault();
  const {x,y}=toXY(ev);
  if (x>26&&x<176&&y>H-80&&y<H-22){ trySummon(); return; }
  let hit=-1,hd=40;
  SLOTS.forEach((s,i)=>{ const d=Math.hypot(s.x-x,s.y-y); if(d<hd){hd=d;hit=i;} });
  if (hit>=0) tapSlot(hit); else st.sel=-1;
}
cv.addEventListener('pointerdown',tap);

};
document.getElementById('vaultBtn').onclick=()=>{
  document.getElementById('menu').classList.add('hidden');
  if (!vault.firstVisit){
    vault.firstVisit = true; vault.diamonds += VAULT_FIRST_VISIT_BONUS; saveVault();
    vaultMsg('首次進入寶庫,贈送 '+VAULT_FIRST_VISIT_BONUS+'💎!');
  } else vaultMsg('');
  document.getElementById('gachaResults').innerHTML = '';
  showVaultTab('gacha');
  renderVault();
  document.getElementById('vaultBox').classList.remove('hidden');
  beep(700,.14,'triangle',.06,1000);
};
document.getElementById('vaultCloseBtn').onclick=()=>{
  document.getElementById('vaultBox').classList.add('hidden');
  document.getElementById('menu').classList.remove('hidden');
};

/* ---------- 寶庫四分頁(PLAN S1 UI):抽卡|角色|寵物|裝備 ---------- */
const VAULT_TAB_IDS = { gacha:'vaultPaneGacha', char:'vaultPaneChar', pet:'vaultPanePet', equip:'vaultPaneEquip' };
function showVaultTab(tab){
  Object.keys(VAULT_TAB_IDS).forEach(t=>{
    const el = document.getElementById(VAULT_TAB_IDS[t]);
    if (el) el.classList.toggle('hidden', t!==tab);
  });
  document.querySelectorAll('#vaultTabs .vTab').forEach(b=>b.classList.toggle('sel', b.dataset.tab===tab));
  if (tab==='char') renderCharGrid();
  if (tab==='pet') renderPetList();
  if (tab==='equip') renderVault();
}
document.querySelectorAll('#vaultTabs .vTab').forEach(b=>{
  b.onclick=()=>{ showVaultTab(b.dataset.tab); beep(440,.06,'sine'); };
});

// 抽卡結果卡片渲染:char=NEW!/+EXP、pet=碎片數、equip=已裝備/分解返鑽
function rarClass(rar){ return 'rar-'+rar; }
function resultCardHtml(r){
  let icon, title, tag;
  if (r.kind==='char'){
    icon = '<img src="'+SPRITES[r.key]+'">';
    title = TYPES[r.key].name;
    tag = r.unlocked ? 'NEW!' : ('+'+r.delta+' EXP');
  } else if (r.kind==='pet'){
    icon = '<span class="ic">'+GEAR_TABLE.pet.species[r.key].icon+'</span>';
    title = GEAR_TABLE.pet.species[r.key].name;
    tag = '碎片+'+r.delta+'('+r.shards+')';
  } else {
    icon = '<span class="ic">'+GEAR_TABLE[r.key].icon+'</span>';
    title = GEAR_TABLE[r.key].name;
    tag = r.equipped ? '已裝備' : ('分解+'+r.refund+'💎');
  }
  return '<div class="resultCard '+rarClass(r.rar)+'">'+icon+'<div>'+title+'</div><span class="tag">'+tag+'</span><span class="rarLbl">'+r.rar+'</span></div>';
}
function renderGachaResults(results){
  const box = document.getElementById('gachaResults');
  if (!box) return;
  box.classList.toggle('ten', results.length>1);
  box.innerHTML = results.map(resultCardHtml).join('');
}
document.getElementById('vaultDrawBtn').onclick=()=>{
  const r = gachaOnce();
  if (r) renderGachaResults([r]);
};
document.getElementById('vaultDraw10Btn').onclick=()=>{
  const rs = gachaTen();
  if (rs.length) renderGachaResults(rs);
};

// 角色頁:12 卡(立繪/名字/職業/Lv/EXP 條);未解鎖=立繪灰階+🔒,點擊提示抽卡解鎖
function renderCharGrid(){
  const grid = document.getElementById('charGrid'); if (!grid) return;
  grid.innerHTML = '';
  TYPE_KEYS.forEach(k=>{
    const T = TYPES[k];
    const unlocked = vault.charUnlock[k];
    const card = document.createElement('div');
    card.className = 'charCard'+(unlocked?'':' locked');
    if (unlocked){
      const prog = charLevelProgress(k);
      const pct = prog.need ? Math.round(prog.exp/prog.need*100) : 100;
      card.innerHTML = '<img src="'+SPRITES[k]+'"><div class="nm">'+T.name+'</div>'+
        '<div class="lvl">'+T.cls+' ・ Lv'+prog.lvl+(prog.lvl>=CHAR_LVL_CAP?'(滿)':'')+'</div>'+
        '<div class="expBar"><i style="width:'+pct+'%"></i></div>';
      card.onclick=()=>{
        const mul = charDmgMul(k);
        vaultMsg(T.name+' 目前傷害加成 ×'+mul.toFixed(2)+'(Lv'+prog.lvl+')');
      };
    } else {
      card.innerHTML = '<img src="'+SPRITES[k]+'" style="filter:grayscale(1) brightness(.35)">'+
        '<div class="nm">🔒 ???</div><div class="lvl">未解鎖</div>';
      card.onclick=()=>{ vaultMsg('尚未解鎖「'+T.name+'」,請抽卡取得'); beep(160,.12,'sawtooth'); };
    }
    grid.appendChild(card);
  });
}

// 寵物頁:3 種寵物 × 各稀有度碎片進度條,達門檻顯示「合成」按鈕(craftPet 已含裝備/分解邏輯)
function renderPetList(){
  const list = document.getElementById('petList'); if (!list) return;
  list.innerHTML = '';
  PET_SPECIES.forEach(sp=>{
    const info = GEAR_TABLE.pet.species[sp];
    const equipped = vault.gear.pet && vault.gear.pet.species===sp;
    const block = document.createElement('div'); block.className = 'petBlock';
    let html = '<div class="hd"><span>'+info.icon+'</span><span>'+info.name+(equipped?'(裝備中 '+vault.gear.pet.rarity+')':'')+'</span></div>';
    RARITY.forEach(r=>{
      const have = (vault.petShards[sp] && vault.petShards[sp][r.key]) || 0;
      const need = PET_SHARD_CRAFT_THRESH[r.key];
      const pct = Math.min(100, Math.round(have/need*100));
      html += '<div class="petRarRow"><span class="rk" style="color:'+r.col+'">'+r.key+'</span>'+
        '<div class="prog"><i style="width:'+pct+'%;background:'+r.col+'"></i></div>'+
        '<span class="amt">'+have+'/'+need+'</span>'+
        (have>=need ? ('<button class="craftBtn" data-sp="'+sp+'" data-rar="'+r.key+'">合成</button>') : '')+
        '</div>';
    });
    block.innerHTML = html;
    list.appendChild(block);
  });
  list.querySelectorAll('.craftBtn').forEach(b=>{
    b.onclick=()=>{
      const res = craftPet(b.dataset.sp, b.dataset.rar);
      beep(res.ok ? (res.equipped?720:520) : 160, .15, res.ok?'triangle':'sawtooth');
      renderPetList();
    };
  });
}

/* ---------- 選關頁(PLAN S3 UI):5x10 網格,鎖定灰階,點可玩關卡進入 ---------- */
function stageStarsDisplay(n){
  const s = stages[n]||0;
  let str=''; for (let i=0;i<3;i++) str += i<s ? '★' : '☆';
  return str;
}
function totalStars(){
  let sum = 0; Object.keys(stages).forEach(k=>{ sum += stages[k]||0; });
  return sum;
}
function renderStageGrid(){
  const grid = document.getElementById('stageGrid'); if (!grid) return;
  grid.innerHTML = '';
  const maxU = maxUnlockedStage();
  for (let n=1; n<=50; n++){
    const locked = n>maxU;
    const cell = document.createElement('div');
    cell.className = 'stageCell'+(locked?' locked':'');
    cell.innerHTML = (locked?'🔒':n) + '<span class="stars">'+(locked?'':stageStarsDisplay(n))+'</span>';
    if (!locked){
      cell.onclick=()=>{
        document.getElementById('stageBox').classList.add('hidden');
        reset(n); st.mode='play';
        beep(660,.15,'triangle',.06,990);
      };
    }
    grid.appendChild(cell);
  }
  const tEl = document.getElementById('stageTotalStars');
  if (tEl) tEl.textContent = '總星數:'+totalStars()+' / 150';
}
document.getElementById('stageBtn').onclick=()=>{
  document.getElementById('menu').classList.add('hidden');
  renderStageGrid();
  document.getElementById('stageBox').classList.remove('hidden');
  beep(700,.14,'triangle',.06,1000);
};
document.getElementById('stageCloseBtn').onclick=()=>{
  document.getElementById('stageBox').classList.add('hidden');
  document.getElementById('menu').classList.remove('hidden');
};

/* ---------- 關卡勝負畫面按鈕(PLAN S3 UI) ---------- */
document.getElementById('stageNextBtn').onclick=()=>{
  const next = st.stageResult.stage+1;
  document.getElementById('stageClearedBox').classList.add('hidden');
  reset(next); st.mode='play';
  beep(660,.15,'triangle',.06,990);
};
document.getElementById('stageClearedMenuBtn').onclick=()=>{
  document.getElementById('stageClearedBox').classList.add('hidden');
  st.mode='menu';
  document.getElementById('menu').classList.remove('hidden');
};
document.getElementById('stageRetryBtn').onclick=()=>{
  const stage = st.stageResult.stage;
  document.getElementById('stageFailedBox').classList.add('hidden');
  reset(stage); st.mode='play';
  beep(660,.15,'triangle',.06,990);
};
document.getElementById('stageFailedMenuBtn').onclick=()=>{
  document.getElementById('stageFailedBox').classList.add('hidden');
  st.mode='menu';
  document.getElementById('menu').classList.remove('hidden');
};
function deckMsg(t){ const el=document.getElementById('deckMsg'); if (el) el.textContent=t; }
function renderDeckGrid(){
  const grid=document.getElementById('deckGrid'); if(!grid) return;
  grid.innerHTML='';
  TYPE_KEYS.forEach(k=>{
    const T=TYPES[k];
    const unlocked = vault.charUnlock[k];
    const card=document.createElement('div'); card.className='deckCard'+(deck.includes(k)?' sel':'')+(unlocked?'':' locked');
    card.innerHTML='<img src="'+SPRITES[k]+'"><div class="nm">'+(unlocked?T.name:'🔒 '+T.name)+'</div>';
    card.onclick=()=>{
      const r = toggleDeckChar(k);
      if (!r.ok){ deckMsg(r.msg); beep(160,.12,'sawtooth'); return; }
      renderDeckGrid(); deckMsg('');
      beep(440,.06,'sine');
    };
    grid.appendChild(card);
  });
}
document.getElementById('deckBtn').onclick=()=>{
  document.getElementById('menu').classList.add('hidden');
  renderDeckGrid();
  document.getElementById('deckBox').classList.remove('hidden');
  beep(700,.14,'triangle',.06,1000);
};
document.getElementById('deckCloseBtn').onclick=()=>{
  if (deck.length<6){
    const extra = TYPE_KEYS.filter(k=>!deck.includes(k) && vault.charUnlock[k]);
    while (deck.length<6 && extra.length) deck.push(extra.shift());
    saveDeck();
    deckMsg('已自動補足至 6 隻'); renderDeckGrid();
    setTimeout(()=>{ document.getElementById('deckBox').classList.add('hidden'); document.getElementById('menu').classList.remove('hidden'); }, 650);
    return;
  }
  document.getElementById('deckBox').classList.add('hidden');
  document.getElementById('menu').classList.remove('hidden');
};

/* ---------- loop ---------- */
let last=performance.now();
function loop(now){
  const dt=Math.min((now-last)/1000,.05); last=now;
  update(dt); draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
