<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>國王別慌!小島守城</title>
<style>
  :root{
    --sky:#8FD8CF; --sky2:#BDE9D2; --pine:#2E5648; --pine2:#1F3D33;
    --sand:#EED9A4; --coral:#FF7B5C; --gold:#FFC94D; --ink:#25382F; --card:#FFF9EA;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    background:linear-gradient(180deg,var(--pine2),var(--pine));
    display:flex;align-items:center;justify-content:center;
    font-family:"Yuanti TC","YouYuan","Microsoft JhengHei UI","PingFang TC",system-ui,sans-serif;
    touch-action:manipulation;
  }
  #wrap{position:relative;height:100vh;aspect-ratio:420/760;max-width:100vw}
  canvas{width:100%;height:100%;display:block;border-radius:0}
  .overlay{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:18px;text-align:center;background:rgba(31,61,51,.78);backdrop-filter:blur(4px);color:var(--card);
    padding:24px;
  }
  .overlay.hidden{display:none}
  .title{font-size:44px;font-weight:800;letter-spacing:2px;color:var(--gold);text-shadow:0 3px 0 rgba(0,0,0,.25)}
  .sub{font-size:15px;line-height:1.9;opacity:.92;max-width:300px}
  .btn{
    font-family:inherit;font-size:20px;font-weight:700;color:#fff;background:var(--coral);
    border:none;border-radius:999px;padding:14px 44px;cursor:pointer;
    box-shadow:0 5px 0 #C9563C;letter-spacing:3px;
  }
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 #C9563C}
  .totem-row{display:flex;flex-direction:column;gap:12px;width:100%;max-width:300px}
  .totem{
    font-family:inherit;background:var(--card);color:var(--ink);border:none;border-radius:16px;
    padding:13px 16px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 #C9B47E;
    display:flex;align-items:center;gap:12px;text-align:left;
  }
  .totem:active{transform:translateY(3px);box-shadow:0 1px 0 #C9B47E}
  .totem .ic{font-size:26px}
  .totem small{display:block;font-weight:400;font-size:12.5px;opacity:.75;margin-top:2px}
  .score{font-size:20px;line-height:2}
  .score b{color:var(--gold);font-size:34px}
  .btn.ghost{background:var(--pine2);box-shadow:0 5px 0 #16281f;font-size:15px;padding:11px 30px}
  .btn.ghost:active{box-shadow:0 2px 0 #16281f}
  .vaultRow{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}
  .gearCard{font-family:inherit;background:var(--card);color:var(--ink);border-radius:16px;
    padding:11px 16px;font-size:14px;font-weight:700;box-shadow:0 4px 0 #C9B47E;
    display:flex;align-items:center;gap:12px;text-align:left}
  .gearCard .ic{font-size:24px}
  .gearCard small{display:block;font-weight:400;font-size:12px;opacity:.75;margin-top:2px}
  .vaultMsg{min-height:20px;font-size:13px;color:var(--gold)}
  .chapterList{font-size:13px;opacity:.88;max-width:300px;line-height:1.7}
</style>

<div id="wrap">
  <canvas id="cv" width="420" height="760"></canvas>

  <div id="menu" class="overlay">
    <div class="title">國王別慌!</div>
    <div class="sub">哥布林大軍從天而降,直撲城牆!<br>
      👺 敵人從上方進攻城牆,別讓它們撞牆<br>
      💰 點「召喚」隨機派出小英雄站上城牆<br>
      🤝 點兩隻「同類同等級」合體升級<br>
      🏰 撐越多波越厲害</div>

    <button class="btn ghost" id="vaultBtn">💎 寶庫</button>
  </div>

  <div id="vaultBox" class="overlay hidden">
    <div class="title" style="font-size:30px">💎 寶庫</div>
    <div class="sub" id="vaultDiamonds" style="margin-top:-8px">鑽石:0</div>
    <div class="vaultRow" id="vaultGearRow"></div>
    <button class="btn" id="vaultDrawBtn">單抽 20💎</button>
    <div class="sub" id="vaultRates" style="font-size:12px;opacity:.8"></div>
    <div class="vaultMsg" id="vaultMsg"></div>
    <button class="btn ghost" id="vaultCloseBtn">返回</button>

  <div id="totemBox" class="overlay hidden">
    <div class="title" style="font-size:30px">🗿 圖騰祝福</div>
    <div class="sub" style="margin-top:-8px">選一個,整場有效</div>
    <div class="totem-row" id="totemRow"></div>
  </div>

  <div id="over" class="overlay hidden">
    <div class="title" style="font-size:36px">城堡淪陷…</div>

    <div class="chapterList" id="chapterList"></div>
    <button class="btn" id="againBtn">再來一場</button>
  </div>
</div>

<script>
"use strict";
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const W = 420, H = 760;

/* ---------- audio ---------- */
let AC = null, muted = false;
function beep(f, dur, type, vol, slide){
  if (muted) return;
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type||'square'; o.frequency.value = f;
    if (slide) o.frequency.exponentialRampToValueAtTime(slide, AC.currentTime+dur);
    g.gain.value = vol||.04; g.gain.exponentialRampToValueAtTime(.0001, AC.currentTime+dur);
    o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime+dur);
  }catch(e){}
}

/* ---------- wall & slots (城牆式防守佈局) ---------- */
// 城牆帶:雉堞造型畫在 WALL_TOP~WALL_BOTTOM,牆血條畫在牆帶正下方。
// 敵人從畫面頂部往下壓,y>=WALL_TOP 視為撞牆。上方為戰場(天空/地面漸層)。
const WALL_TOP = 600, WALL_BOTTOM = 660;
const SLOT_Y = 628;
const PET_ICON = { x: W-18, y: WALL_TOP-14 };
const BASE_SLOTS = 8, MAX_SLOTS = 10;
// 槽位鄰接表產生器:橫排一列,鄰接 = 左右相鄰索引(index±1)。
// 用於 😇 輔助光環判定「相鄰槽位」;擴格/reset 時重建。
function buildAdj(n){
  return Array.from({length:n}, (_,i)=>{
    const a=[]; if(i>0) a.push(i-1); if(i<n-1) a.push(i+1); return a;
  });
}
function makeSlots(n){
  return Array.from({length:n}, (_,i)=>({ x:(W/n)*(i+0.5), y:SLOT_Y, unit:null }));
}
let SLOTS = makeSlots(BASE_SLOTS);
let ADJ = buildAdj(BASE_SLOTS);
// 槽位全滿 + 不存在任何可合成對(同 type、同 lvl、lvl<6)時視為卡死。
// isDeadlocked() 呼叫前提是至少已知全滿(內部仍會再檢查一次,雙重保險)。
function isDeadlocked(){
  if (SLOTS.some(s=>!s.unit)) return false;
  for (let i=0;i<SLOTS.length;i++){
    const a = SLOTS[i].unit;
    if (a.lvl>=6) continue;
    for (let j=i+1;j<SLOTS.length;j++){
      const b = SLOTS[j].unit;
      if (b.type===a.type && b.lvl===a.lvl) return false;
    }
  }
  return true;
}
// 卡死時擴增一個空槽(防卡死自動擴格):x 全部重排、ADJ 重建,上限 MAX_SLOTS。
function relayoutSlots(){
  const n = SLOTS.length;
  SLOTS.forEach((s,i)=>{ s.x = (W/n)*(i+0.5); });
  ADJ = buildAdj(n);
}
function grantExtraSlot(){
  if (SLOTS.length >= MAX_SLOTS) return false;
  SLOTS.push({ x:0, y:SLOT_Y, unit:null });
  relayoutSlots();
  floatTxt(W/2, SLOT_Y-66, '🧱 牆面擴建!+1 格', '#FFC94D', 15);
  puff(W/2, SLOT_Y-40, '#FFC94D', 10);
  beep(880,.22,'triangle',.06,1200);
  return true;
}
function auraBuff(i){
  let sum = 0;
  for (const j of ADJ[i]){
    const nb = SLOTS[j].unit;
    if (nb && nb.type==='support') sum += (0.10+0.06*nb.lvl)*(nb.mul||1);
  }
  return sum * (st.buff.auraMul||1);
}

/* ---------- gacha rarity (teaching: rates + pity + power) ---------- */
// 公開機率表:總和 100。星級越高,起始等級與傷害倍率越高 → 稀有度直接換算戰力。
const RARITY = [
  {key:'N',   name:'普通',  rate:70, col:'#AEB9C4', star:1, startLvl:1, mul:1.00},
  {key:'R',   name:'稀有',  rate:22, col:'#6FBF73', star:2, startLvl:1, mul:1.35},
  {key:'SR',  name:'超稀有', rate:6,  col:'#7E8FE0', star:3, startLvl:2, mul:1.80},
  {key:'SSR', name:'極稀有', rate:2,  col:'#FFC94D', star:4, startLvl:3, mul:2.60}
];
const PITY = 10; // 連抽未出 SR 以上,第 10 抽保底
function weightedPick(pool){
  const sum = pool.reduce((a,x)=>a+x.rate,0);
  let r = Math.random()*sum;
  for (const x of pool){ if ((r-=x.rate)<=0) return x; }
  return pool[pool.length-1];
}
// 通用保底抽取:holder[key] 累計未出 SR+ 的抽數,達 PITY 強制 SR+,出 SR+ 即歸零。
// 局內兵種召喚(st.pity)與局外裝備抽卡(vault.gearPity)共用同一套規則。
function rollRarityGeneric(holder, key){
  holder[key] = (holder[key]||0) + 1;
  const forced = holder[key] >= PITY;
  const pool = forced ? RARITY.filter(x=>x.star>=3) : RARITY;
  const r = weightedPick(pool);
  if (r.star>=3) holder[key] = 0;
  return r;
}
function rollRarity(){ return rollRarityGeneric(st, 'pity'); }

const VAULT_KEY = 'kdp_vault';
function loadVault(){
  let v = null;
  try{ v = JSON.parse(localStorage.getItem(VAULT_KEY)||'null'); }catch(e){ v = null; }
  if (!v || typeof v!=='object') v = {};
  if (typeof v.diamonds!=='number') v.diamonds = 0;
  if (!v.gear) v.gear = { weapon:null, charm:null, pet:null };
  if (!v.pullCounts || typeof v.pullCounts !== 'object') v.pullCounts = { N:0, R:0, SR:0, SSR:0 };
  if (typeof v.gearPity!=='number') v.gearPity = 0;
  if (typeof v.firstVisit!=='boolean') v.firstVisit = false;
  return v;
}

// 「取最強」比較:星級優先,同星比數值(同欄位內部比較,pet 跨物種比較以數值當戰力代理)
function isGearStronger(a, b){
  if (!b) return true;
  if (a.star !== b.star) return a.star > b.star;
  return a.value > b.value;
}
function gearItemLabel(it){
  const nm = it.cat==='pet' ? GEAR_TABLE.pet.species[it.species].name : GEAR_TABLE[it.cat].name;
  const ic = it.cat==='pet' ? GEAR_TABLE.pet.species[it.species].icon : GEAR_TABLE[it.cat].icon;
  return ic+nm+' '+it.rarity;
}

  if (cat==='pet'){
    const sp = PET_SPECIES[Math.floor(Math.random()*PET_SPECIES.length)];
    item = { cat:'pet', species:sp, rarity:r.key, star:r.star, value:GEAR_TABLE.pet.species[sp].values[idx] };
  } else {
    item = { cat, rarity:r.key, star:r.star, value:GEAR_TABLE[cat].values[idx] };
  }
  const old = vault.gear[cat];
  let msg;
  if (isGearStronger(item, old)){
    vault.gear[cat] = item;
    if (old){ vault.diamonds += GEAR_DISASSEMBLE_REFUND; msg = '獲得 '+gearItemLabel(item)+'!舊裝備分解 +'+GEAR_DISASSEMBLE_REFUND+'💎'; }
    else msg = '獲得 '+gearItemLabel(item)+'!已裝備';
  } else {
    vault.diamonds += GEAR_DISASSEMBLE_REFUND;
    msg = '獲得 '+gearItemLabel(item)+',較弱,已分解 +'+GEAR_DISASSEMBLE_REFUND+'💎';
  }
  saveVault();
  vaultMsg(msg);
  renderVault();
  beep(r.star>=3?720:520, r.star>=3?.2:.12, 'triangle', .05, r.star>=3?1080:780);
}
function vaultMsg(t){ const el=document.getElementById('vaultMsg'); if (el) el.textContent = t; }
function renderVault(){
  const dEl = document.getElementById('vaultDiamonds'); if (dEl) dEl.textContent = '💎 鑽石:'+vault.diamonds;
  const row = document.getElementById('vaultGearRow');
  if (row){
    row.innerHTML = '';
    GEAR_CATS.forEach(cat=>{
      const it = vault.gear[cat];

      const icon = cat==='pet' ? (it?GEAR_TABLE.pet.species[it.species].icon:'🐾') : GEAR_TABLE[cat].icon;

      else if (cat==='charm') desc = it.rarity+' 城堡上限 +'+it.value;
      else desc = it.rarity+' '+GEAR_TABLE.pet.species[it.species].name+' '+GEAR_TABLE.pet.species[it.species].desc+' +'+Math.round(it.value*100)+'%';
      const div = document.createElement('div'); div.className = 'gearCard';

/* ---------- diversity bonus (職業羈絆) ---------- */
// 場上不同兵種種類數(support 算一種):>=4 種 +10% 傷害,6 種全滿 +20%(取高不疊加)
function computeDiversity(){
  const types = new Set();
  SLOTS.forEach(s=>{ if (s.unit) types.add(s.unit.type); });
  const count = types.size;
  let bonus = 0;
  if (count>=6) bonus = 0.20; else if (count>=4) bonus = 0.10;
  return { count, bonus };
}

/* ---------- chapter rating (章節評級結算) ---------- */
// 每 10 波依「當下城堡血量」評級,結算鑽石直接存入寶庫(vault),並記錄供 game over 顯示
const CHAPTER_DIAMONDS = { S:30, A:20, B:12, C:8 };
function chapterRating(hp){
  if (hp>=9) return 'S';
  if (hp>=7) return 'A';
  if (hp>=4) return 'B';
  return 'C';
}
function settleChapter(){
  const chapter = st.wave/10;
  const rating = chapterRating(st.castle);
  const reward = CHAPTER_DIAMONDS[rating];
  st.chapterLog.push({ chapter, rating, castle:st.castle, reward });
  vault.diamonds += reward; saveVault();
  st.chapterBanner = { text:'📖 第'+chapter+'章 評級 '+rating+'  +'+reward+'💎', t:0 };
  beep(rating==='S'?880:rating==='A'?700:rating==='B'?560:420, .3, 'triangle', .06, rating==='S'?1200:900);
}

/* ---------- waves ---------- */
function waveHp(w){ return 8*Math.pow(1.33,w); }
function startWave(){
  st.wave++; st.inWave = true;
  st.waveLeft = Math.min(6 + st.wave*2, 34);
  st.spawnT = 0;
  if (st.wave % 5 === 0) st.waveLeft = Math.max(4, Math.floor(st.waveLeft*.5));
}
function spawnEnemy(){
  const boss = (st.wave % 5 === 0 && st.waveLeft === 1);
  const hp = waveHp(st.wave) * (boss?12:1);
  st.enemies.push({
    x: 20+Math.random()*(W-40), y:-30, hp, maxHp:hp,
    speed:(38 + Math.min(st.wave*1.2, 30)) * (boss?.6:1),
    boss, wob:Math.random()*7, dead:false,
    slow:null, poison:[], poisonTickT:.5
  });
}

function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
function floatTxt(x,y,txt,col,size){ st.floats.push({x,y,txt,col,size:size||13,t:0}); }
function puff(x,y,col,n){ for(let i=0;i<(n||7);i++) st.puffs.push({x,y,vx:(Math.random()-.5)*130,vy:(Math.random()-.5)*130-30,t:0,col}); }

/* ---------- summon & merge ---------- */
function trySummon(){
  if (st.coins < st.summonCost) { floatTxt(W/2, H-135, '金幣不夠!', '#FF7B5C', 15); beep(160,.15,'sawtooth'); return; }
  const empty = SLOTS.filter(s=>!s.unit);
  if (!empty.length) { floatTxt(W/2, H-135, '沒空位了,先合體!', '#FF7B5C', 15); beep(160,.15,'sawtooth'); return; }
  st.coins -= st.summonCost; st.summonCost += 2;
  const slot = empty[Math.floor(Math.random()*empty.length)];
  const type = pickType();
  const rar = rollRarity();
  slot.unit = { type, lvl:rar.startLvl, cd:0, pop:.45, star:rar.star, mul:rar.mul, rarCol:rar.col };
  puff(slot.x, slot.y, rar.col, rar.star>=3?12:7);
  floatTxt(slot.x, slot.y-34, rar.key, rar.col, rar.star>=3?18:14);
  beep(rar.star>=3?720:520, rar.star>=3?.2:.12, 'triangle', .05, rar.star>=3?1080:780);
}
function tapSlot(i){
  const s = SLOTS[i];
  if (st.sel === -1){
    if (s.unit){ st.sel = i; beep(440,.06,'sine'); }
    return;
  }
  if (st.sel === i){ st.sel = -1; return; }
  const a = SLOTS[st.sel], b = s;
  if (a.unit && b.unit && a.unit.type===b.unit.type && a.unit.lvl===b.unit.lvl && a.unit.lvl<6){
    b.unit.lvl++; b.unit.pop = .45;
    b.unit.star = Math.max(a.unit.star, b.unit.star);   // 合體保留較高星級與倍率
    b.unit.mul  = Math.max(a.unit.mul,  b.unit.mul);
    b.unit.rarCol = a.unit.mul>b.unit.mul ? a.unit.rarCol : b.unit.rarCol;
    a.unit = null;
    puff(b.x, b.y, '#FFC94D', 12);
    floatTxt(b.x, b.y-34, 'LV'+b.unit.lvl+'!', '#FFC94D', 17);
    beep(620,.16,'triangle',.06,930);
  } else if (b.unit){ st.sel = i; beep(440,.06,'sine'); return; }
  st.sel = -1;
}

/* ---------- update ---------- */
function update(dt){
  st.t += dt;
  // 章節橫幅計時獨立於 mode,即使圖騰選單蓋在上面也持續倒數,不卡住下一步流程
  if (st.chapterBanner){ st.chapterBanner.t += dt; if (st.chapterBanner.t>2) st.chapterBanner=null; }
  if (st.mode!=='play') return;
  st.diversity = computeDiversity();

  // 防卡死自動擴格:每 0.5 秒節流檢查一次,全滿且無可合成對就擴一格。
  st.deadlockT -= dt;
  if (st.deadlockT<=0){
    st.deadlockT = 0.5;
    if (isDeadlocked()) grantExtraSlot();
  }

  // wave flow
  if (st.inWave){
    if (st.waveLeft>0){
      st.spawnT -= dt;
      if (st.spawnT<=0){ spawnEnemy(); st.waveLeft--; st.spawnT = st.wave%5===0 && st.waveLeft===0 ? .9 : Math.max(.35, .95 - st.wave*.02); }
    } else if (!st.enemies.length){
      st.inWave=false; st.betweenT=2.2;
      const bonus=Math.round((14+st.wave*2)*st.buff.coin);
      st.coins+=bonus; floatTxt(W/2,300,'波次獎勵 +'+bonus+' 💰','#FFC94D',17);
      beep(560,.2,'triangle',.05,840);
      if (st.wave%5===0) offerTotems();
      if (st.wave%10===0) settleChapter();
    }
  } else {
    st.betweenT-=dt;
    if (st.betweenT<=0) startWave();
  }

  // enemies:從頂部往下壓,撞牆(y>=WALL_TOP)扣血後消失(普通1/Boss3),冰法減速作用於下降速度
  for (const e of st.enemies){
    if (e.y >= WALL_TOP){
      e.dead = true;
      const dmgToWall = e.boss ? 3 : 1;
      st.castle -= dmgToWall;
      st.shake = .35;
      beep(120,.3,'sawtooth',.07);
      floatTxt(e.x, WALL_TOP-10, '-'+dmgToWall+' 🏰', '#FF5A5A', 18);
      if (st.castle<=0) gameOver();
      continue;
    }
    const slowMul = (e.slow && st.t<e.slow.until) ? (1-e.slow.frac) : 1;
    e.y += e.speed*slowMul*dt;
  }
  st.enemies=st.enemies.filter(e=>!e.dead);

  // status effects: 毒 tick(每 0.5 秒結算一次,滿層時最舊一層已在 applyPoison 換掉)
  for (const e of st.enemies){
    if (e.poison && e.poison.length){
      e.poison = e.poison.filter(l=>l.until>st.t);
      if (e.poison.length){
        e.poisonTickT -= dt;
        if (e.poisonTickT<=0){
          e.poisonTickT += .5;
          const total = e.poison.reduce((a,l)=>a+l.dps,0);
          damage(e, total*.5);
        }
      }
    }
  }
  st.enemies=st.enemies.filter(e=>!e.dead);

  // units fire
  for (let si=0; si<SLOTS.length; si++){
    const s=SLOTS[si];
    const u=s.unit; if(!u) continue;
    u.pop=Math.max(0,u.pop-dt*2);
    const T=TYPES[u.type];
    if (T.noAttack) continue; // 😇 輔助:不攻擊,只提供相鄰光環
    u.cd-=dt*st.buff.spd;
    if (u.cd>0) continue;
    // 全螢幕射程,無 range 概念:每格英雄獨立索敵,目標=最接近牆的敵人(y 最大者)
    let best=null, by=-1;
    for (const e of st.enemies){ if (e.y>by){ by=e.y; best=e; } }
    if (!best) continue;
    u.cd=T.cd;
    // 傷害公式:基礎 × 等級成長 × 星級倍率 × 圖騰buff × 裝備武器buff × (1+相鄰😇輔助光環) × (1+職業羈絆加成)
    const aura = auraBuff(si);
    const dmg = T.dmg * LVL_MUL(u.lvl) * (u.mul||1) * st.buff.dmg * st.buff.gearDmg * (1+aura) * (1+st.diversity.bonus);
    st.projs.push({x:s.x,y:s.y-14,tgt:best,type:u.type,dmg,speed:430,lvl:u.lvl});
    beep(u.type==='archer'?900:u.type==='mage'?300:u.type==='icemage'?520:u.type==='poison'?260:660,.05,u.type==='mage'?'sine':'square',.02);
  }

  // projectiles
  for (const p of st.projs){
    if (p.tgt.dead || p.tgt.hp<=0){ p.done=true; continue; }
    const d=Math.hypot(p.tgt.x-p.x,p.tgt.y-p.y);
    if (d<10){ p.done=true; hit(p); continue; }
    p.x+=(p.tgt.x-p.x)/d*p.speed*dt; p.y+=(p.tgt.y-p.y)/d*p.speed*dt;
  }
  st.projs=st.projs.filter(p=>!p.done);

  // fx
  for (const f of st.floats) f.t+=dt;
  st.floats=st.floats.filter(f=>f.t<1);
  for (const q of st.puffs){ q.t+=dt; q.x+=q.vx*dt; q.y+=q.vy*dt; q.vy+=160*dt; }
  st.puffs=st.puffs.filter(q=>q.t<.55);
  st.shake=Math.max(0,st.shake-dt);
}

function hit(p){
  const T=TYPES[p.type];
  damage(p.tgt,p.dmg);
  if (T.splash){ for (const e of st.enemies){ if (e!==p.tgt && !e.dead && Math.hypot(e.x-p.tgt.x,e.y-p.tgt.y)<=T.splash) damage(e,p.dmg*.6); } puff(p.tgt.x,p.tgt.y,'#A9B7FF',9); }
  if (T.chain){ let src=p.tgt,n=T.chain,dmg=p.dmg*.65,hitset=new Set([p.tgt]);
    while(n-->0){ let nx=null,nd=95;
      for (const e of st.enemies){ if(!hitset.has(e)&&!e.dead){ const d=Math.hypot(e.x-src.x,e.y-src.y); if(d<nd){nd=d;nx=e;} } }
      if(!nx)break; damage(nx,dmg); hitset.add(nx); st.puffs.push({x:(src.x+nx.x)/2,y:(src.y+nx.y)/2,vx:0,vy:0,t:.35,col:'#FFE38A'}); src=nx; dmg*=.65; }
  }
  if (T.slow && !p.tgt.dead) applySlow(p.tgt, p.lvl);
  if (T.poison && !p.tgt.dead) applyPoison(p.tgt, p.dmg);
}
// ❄️ 冰法減速:命中刷新持續時間、同不疊加取最強;Boss 減速減半;寒霜圖騰可拉高上限與加成
function applySlow(e, lvl){
  let frac = Math.min(st.buff.frostCap, 0.20+0.05*lvl+st.buff.frostBonus);
  frac = Math.min(frac, 0.70); // 絕對上限:即使寒霜圖騰+冰狐寵物疊加,總減速仍不超過 70%
  if (e.boss) frac *= 0.5;
  const active = e.slow && st.t < e.slow.until;
  const newFrac = active ? Math.max(e.slow.frac, frac) : frac;
  e.slow = { frac:newFrac, until:st.t+1.5 };
}
// ☠️ 毒師疊毒:每層 3 秒,單一敵人上限 5 層(瘟疫圖騰 +2),滿層時刷新最舊一層
function applyPoison(e, hitDmg){
  const cap = 5 + (st.buff.poisonCapBonus||0);
  e.poison = (e.poison||[]).filter(l=>l.until>st.t);
  const layer = { dps: hitDmg*0.6*(st.buff.poisonDmgMul||1), until: st.t+3 };
  if (e.poison.length>=cap){
    let oldestIdx=0, oldestUntil=e.poison[0].until;
    for (let k=1;k<e.poison.length;k++){ if (e.poison[k].until<oldestUntil){ oldestUntil=e.poison[k].until; oldestIdx=k; } }
    e.poison[oldestIdx]=layer;
  } else {
    e.poison.push(layer);
  }
  if (e.poisonTickT===undefined) e.poisonTickT=.5;
}
function damage(e,d){
  e.hp-=d;
  floatTxt(e.x+(Math.random()*16-8), e.y-22, Math.round(d), '#FFF3D6', e.boss?15:12);
  if (e.hp<=0 && !e.dead){
    e.dead=true;
    const c=Math.round((2+st.wave*.6)*(e.boss?10:1)*st.buff.coin*st.buff.gearCoin);
    st.coins+=c;
    floatTxt(e.x,e.y-8,'+'+c+'💰','#FFC94D',e.boss?18:13);
    puff(e.x,e.y,e.boss?'#FF9C6B':'#B7E3A1',e.boss?18:8);
    beep(e.boss?200:340,e.boss?.35:.09,'triangle',.05,e.boss?90:220);
  }
}
function gameOver(){
  st.mode='over';
  if (st.wave>st.best){ st.best=st.wave; localStorage.setItem('kdp_best',st.best); }
  // game over 額外結算:鑽石 += floor(存活波數 × 1.5),直接存入寶庫
  const waveBonus = Math.floor(st.wave*1.5);
  vault.diamonds += waveBonus; saveVault();
  document.getElementById('finalWave').textContent=st.wave;
  document.getElementById('bestLine').textContent='最佳紀錄:'+st.best+' 波';
  const listEl = document.getElementById('chapterList');
  if (listEl){
    let html = st.chapterLog.map(c=>'第'+c.chapter+'章:評級 '+c.rating+'(城堡血'+c.castle+')+'+c.reward+'💎').join('<br>');
    if (html) html += '<br>';
    html += '存活獎勵 +'+waveBonus+'💎 ・ 目前鑽石 💎'+vault.diamonds;
    listEl.innerHTML = html;
  }
  document.getElementById('over').classList.remove('hidden');
}

/* ---------- draw ---------- */
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function draw(){
  ctx.save();
  if (st.shake>0) ctx.translate((Math.random()-.5)*8*st.shake,(Math.random()-.5)*8*st.shake);

  // sky→battlefield (上方 2/3+ 畫面 = 戰場,天空/地面漸層,銜接城牆頂緣)
  const g=ctx.createLinearGradient(0,0,0,WALL_TOP);
  g.addColorStop(0,'#8FD8CF'); g.addColorStop(.45,'#BDE9D2'); g.addColorStop(.7,'#A8DA82'); g.addColorStop(1,'#8FCB6B');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,WALL_TOP);
  // clouds
  ctx.fillStyle='rgba(255,255,255,.75)';
  [[70,60,26],[290,44,20],[350,95,15]].forEach(([x,y,r],i)=>{
    const ox=Math.sin(st.t*.25+i*2)*8;
    ctx.beginPath(); ctx.arc(x+ox,y,r,0,7); ctx.arc(x+ox+r*.9,y+4,r*.75,0,7); ctx.arc(x+ox-r*.9,y+5,r*.7,0,7); ctx.fill();
  });

  // 城牆(雉堞造型):牆體矩形 + 垛口方塊
  ctx.fillStyle='#C9B48B'; ctx.fillRect(0,WALL_TOP,W,WALL_BOTTOM-WALL_TOP);
  ctx.fillStyle='rgba(0,0,0,.12)'; ctx.fillRect(0,WALL_TOP,W,6);
  ctx.fillStyle='#B5A07A';
  for (let mx=6; mx<W; mx+=40){ ctx.fillRect(mx,WALL_TOP-14,24,14); }
  ctx.fillStyle='rgba(0,0,0,.08)';
  for (let lx=0; lx<W; lx+=20){ ctx.fillRect(lx,WALL_TOP+22,1,WALL_BOTTOM-WALL_TOP-22); }

  // 牆血條(牆帶正下方,綠色)
  ctx.fillStyle='rgba(0,0,0,.28)'; rr(14,WALL_BOTTOM+1,W-28,7,3); ctx.fill();
  ctx.fillStyle='#6FBF73'; rr(14,WALL_BOTTOM+1,(W-28)*Math.max(0,st.castle/st.castleMax),7,3); ctx.fill();

  ctx.textAlign='center'; ctx.textBaseline='middle';
  // 已裝備寵物小圖示(寶庫裝備,開局注入),畫在牆旁
  if (st.pet){
    ctx.font='22px serif';
    ctx.fillText(GEAR_TABLE.pet.species[st.pet.species].icon, PET_ICON.x, PET_ICON.y);
  }

  // slots & units
  SLOTS.forEach((s,i)=>{
    ctx.fillStyle='rgba(255,255,255,.35)';
    rr(s.x-26,s.y-26,52,52,14); ctx.fill();
    if (st.sel===i){
      ctx.strokeStyle='#FF7B5C'; ctx.lineWidth=3; rr(s.x-28,s.y-28,56,56,15); ctx.stroke();
    }
    const u=s.unit; if(!u) return;
    const T=TYPES[u.type];
    const wob=Math.sin(st.t*3+i)*2, pop=1+u.pop*.5;
    // 😇 輔助光環:被 buff 槽位淡金色光暈
    if (auraBuff(i)>0){
      ctx.save(); ctx.globalAlpha=.4; ctx.fillStyle='#FFE9A8';
      ctx.beginPath(); ctx.ellipse(s.x,s.y+4,26*pop,24*pop,0,0,7); ctx.fill(); ctx.restore();
    }
    // rarity ring
    if (u.star>=3){ ctx.strokeStyle=u.rarCol; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.ellipse(s.x,s.y+4,21*pop,19*pop,0,0,7); ctx.stroke(); }
    // 立繪(Q版貓咪英雄 sprite):等比縮放,腳底貼牆帶頂緣,水平置中於槽位;圖片未 loaded 時 fallback 畫原 emoji
    const simg = SPRITE_IMGS[u.type];
    if (simg && simg.complete && simg.naturalWidth>0){
      const spacing = W/SLOTS.length;
      const baseSH = Math.min(46, spacing-4);
      const sh = baseSH*pop, sw = sh*(simg.naturalWidth/simg.naturalHeight);
      const feetY = s.y+22+wob*.3;
      ctx.drawImage(simg, s.x-sw/2, feetY-sh, sw, sh);
    } else {
      // body (fallback)
      ctx.fillStyle=T.body;
      ctx.beginPath(); ctx.ellipse(s.x,s.y+4+wob*.3,19*pop,17*pop,0,0,7); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.28)';
      ctx.beginPath(); ctx.ellipse(s.x-5,s.y-2+wob*.3,7*pop,5*pop,0,0,7); ctx.fill();
      // face (fallback)
      ctx.font=(20*pop)+'px serif'; ctx.fillText(T.face,s.x,s.y-14+wob);
    }
    // star pips (rarity)
    ctx.fillStyle=u.rarCol||'#AEB9C4'; ctx.font='9px sans-serif';
    let stars=''; for(let k=0;k<(u.star||1);k++) stars+='★';
    ctx.fillText(stars, s.x, s.y-30);
    // level badge
    ctx.fillStyle='#2E5648'; rr(s.x+8,s.y+10,22,15,7); ctx.fill();
    ctx.fillStyle='#FFC94D'; ctx.font='bold 10.5px sans-serif'; ctx.fillText('Lv'+u.lvl,s.x+19,s.y+18);
  });

  // enemies
  for (const e of st.enemies){
    const r=e.boss?26:14, wob=Math.sin(st.t*7+e.wob)*2.4;
    const slowed = e.slow && st.t<e.slow.until;
    const poisoned = e.poison && e.poison.length;
    ctx.fillStyle='rgba(0,0,0,.12)';
    ctx.beginPath(); ctx.ellipse(e.x,e.y+r*.85,r*.8,r*.3,0,0,7); ctx.fill();
    // ❄️ 減速淡藍色調
    if (slowed){ ctx.save(); ctx.globalAlpha=.38; ctx.fillStyle='#8FD3E8';
      ctx.beginPath(); ctx.arc(e.x,e.y,r*1.15,0,7); ctx.fill(); ctx.restore(); }
    // ☠️ 中毒綠色調
    if (poisoned){ ctx.save(); ctx.globalAlpha=.32; ctx.fillStyle='#6FBF73';
      ctx.beginPath(); ctx.arc(e.x,e.y,r*1.02,0,7); ctx.fill(); ctx.restore(); }
    const eimg = SPRITE_IMGS[e.boss?'enemy_boss':'enemy_mob'];
    if (eimg && eimg.complete && eimg.naturalWidth>0){
      const eh=(e.boss?72:38), ew=eh*(eimg.naturalWidth/eimg.naturalHeight);
      ctx.drawImage(eimg, e.x-ew/2, e.y-eh/2+wob, ew, eh);
    } else {
      ctx.font=(e.boss?46:26)+'px serif';
      ctx.fillText(e.boss?'👹':'👺',e.x,e.y+wob);
    }
    if (slowed){ ctx.font='13px sans-serif'; ctx.fillText('❄',e.x+r*.75,e.y-r*.6); }
    if (poisoned){ ctx.fillStyle='#1F3D33'; ctx.font='bold 10px sans-serif'; ctx.fillText(''+e.poison.length,e.x-r*.75,e.y-r*.6); }
    // hp bar
    const bw=e.boss?46:26;
    ctx.fillStyle='rgba(0,0,0,.25)'; rr(e.x-bw/2,e.y-(e.boss?36:24),bw,4.5,2); ctx.fill();
    ctx.fillStyle=e.boss?'#FF6B81':'#8BE28F'; rr(e.x-bw/2,e.y-(e.boss?36:24),bw*Math.max(0,e.hp/e.maxHp),4.5,2); ctx.fill();
  }

  // projectiles
  for (const p of st.projs){
    ctx.fillStyle=TYPES[p.type].proj;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.type==='mage'?6:4,0,7); ctx.fill();
  }

  // puffs
  for (const q of st.puffs){
    ctx.globalAlpha=1-q.t/.55; ctx.fillStyle=q.col;
    ctx.beginPath(); ctx.arc(q.x,q.y,4.5,0,7); ctx.fill(); ctx.globalAlpha=1;
  }
  // float texts
  for (const f of st.floats){
    ctx.globalAlpha=1-f.t; ctx.fillStyle=f.col;
    ctx.font='bold '+f.size+'px sans-serif';
    ctx.fillText(f.txt,f.x,f.y-f.t*26); ctx.globalAlpha=1;
  }

  drawHud();

  // 章節結算橫幅(2 秒淡出,不暫停遊戲)
  if (st.chapterBanner){
    const b=st.chapterBanner;
    const alpha = b.t<1.6 ? 1 : Math.max(0,1-(b.t-1.6)/0.4);
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.font='bold 15px sans-serif';
    const tw=ctx.measureText(b.text).width;
    ctx.fillStyle='rgba(255,201,77,.95)'; rr(W/2-tw/2-16,84,tw+32,38,14); ctx.fill();
    ctx.fillStyle='#2E5648'; ctx.textAlign='center'; ctx.fillText(b.text,W/2,84+23);
    ctx.restore();
  }

  ctx.restore();
}

function drawHud(){
  // top bar
  ctx.fillStyle='rgba(31,61,51,.85)'; rr(10,10,W-20,44,14); ctx.fill();
  ctx.textAlign='left'; ctx.fillStyle='#FFF9EA'; ctx.font='bold 16px sans-serif';
  const waveTxt = st.inWave ? '第 '+st.wave+' 波' : (st.wave===0?'準備中…':'第 '+(st.wave+1)+' 波 即將來襲');
  ctx.fillText('🌊 '+waveTxt, 24, 32);
  ctx.textAlign='right';
  ctx.fillStyle='#FFC94D'; ctx.fillText('💰 '+st.coins, W-24, 32);
  ctx.textAlign='center';

  // 職業羈絆徽章:場上兵種種類達門檻才顯示
  if (st.diversity && st.diversity.bonus>0){
    const label = '🔗羈絆×'+st.diversity.count+' +'+Math.round(st.diversity.bonus*100)+'%';
    ctx.font='bold 12.5px sans-serif';
    const tw=ctx.measureText(label).width;
    ctx.fillStyle='rgba(111,191,115,.92)'; rr(W/2-tw/2-12,60,tw+24,24,12); ctx.fill();
    ctx.fillStyle='#fff'; ctx.fillText(label, W/2, 60+15);
  }

  // bottom bar
  ctx.fillStyle='rgba(31,61,51,.85)'; rr(10,H-92,W-20,82,18); ctx.fill();
  // summon button
  const can = st.coins>=st.summonCost && SLOTS.some(s=>!s.unit);
  ctx.fillStyle=can?'#FF7B5C':'#7A6E62'; rr(26,H-80,150,58,16); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 19px sans-serif'; ctx.fillText('召喚英雄',101,H-58);
  ctx.font='bold 13px sans-serif'; ctx.fillText('💰'+st.summonCost,101,H-38);
  // rates + pity (published, like a real gacha banner)
  ctx.textAlign='left';
  ctx.font='11.5px sans-serif';
  ctx.fillStyle='#AEB9C4'; ctx.fillText('N 70%',196,H-66);
  ctx.fillStyle='#6FBF73'; ctx.fillText('R 22%',248,H-66);
  ctx.fillStyle='#7E8FE0'; ctx.fillText('SR 6%',300,H-66);
  ctx.fillStyle='#FFC94D'; ctx.fillText('SSR 2%',352,H-66);
  ctx.fillStyle='rgba(255,249,234,.92)'; ctx.font='12px sans-serif';
  ctx.fillText('保底:'+(PITY-st.pity)+' 抽內必出 SR＋', 196, H-46);
  // 兵種召喚池機率(公開):🏹22 🔮22 ⚡22 ❄️14 ☠️14 😇6
  ctx.font='10px sans-serif';
  ctx.fillText('🏹22 🔮22 ⚡22 ❄️14 ☠️14 😇6', 196, H-28);
  ctx.textAlign='center';
}

/* ---------- input ---------- */
function toXY(ev){
  const r=cv.getBoundingClientRect();
  const p=ev.touches?ev.touches[0]:ev;
  return { x:(p.clientX-r.left)/r.width*W, y:(p.clientY-r.top)/r.height*H };
}
function tap(ev){
  if (st.mode!=='play') return;
  ev.preventDefault();
  const {x,y}=toXY(ev);
  if (x>26&&x<176&&y>H-80&&y<H-22){ trySummon(); return; }
  let hit=-1,hd=40;
  SLOTS.forEach((s,i)=>{ const d=Math.hypot(s.x-x,s.y-y); if(d<hd){hd=d;hit=i;} });
  if (hit>=0) tapSlot(hit); else st.sel=-1;
}
cv.addEventListener('pointerdown',tap);

document.getElementById('startBtn').onclick=()=>{
  document.getElementById('menu').classList.add('hidden');
  reset(); st.mode='play'; beep(660,.15,'triangle',.06,990);
};
document.getElementById('againBtn').onclick=()=>{
  document.getElementById('over').classList.add('hidden');
  reset(); st.mode='play';
};
document.getElementById('vaultBtn').onclick=()=>{
  document.getElementById('menu').classList.add('hidden');
  if (!vault.firstVisit){
    vault.firstVisit = true; vault.diamonds += VAULT_FIRST_VISIT_BONUS; saveVault();
    vaultMsg('首次進入寶庫,贈送 '+VAULT_FIRST_VISIT_BONUS+'💎!');
  } else vaultMsg('');
  renderVault();
  document.getElementById('vaultBox').classList.remove('hidden');
  beep(700,.14,'triangle',.06,1000);
};
document.getElementById('vaultCloseBtn').onclick=()=>{
  document.getElementById('vaultBox').classList.add('hidden');
  document.getElementById('menu').classList.remove('hidden');
};
document.getElementById('vaultDrawBtn').onclick=()=>gachaGear();

/* ---------- loop ---------- */
let last=performance.now();
function loop(now){
  const dt=Math.min((now-last)/1000,.05); last=now;
  update(dt); draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
